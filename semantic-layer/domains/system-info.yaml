          - "show language and encoding settings"
          - "what is my LANG setting"
          - "check locale"
        pattern: "locale"
        example: "locale"
      - intent: "list all available locales installed on the system"
        alternate_phrasings:
          - "locale -a"
          - "what locales are installed on this machine"
          - "which language packs are available"
          - "show all locales"
          - "list available locales"
        pattern: "locale -a"
        example: "locale -a"
      - intent: "show the current date format for the locale"
        alternate_phrasings:
          - "locale date_fmt"
          - "what date format does this locale use"
          - "show the strftime format for dates in this locale"
        pattern: "locale date_fmt"
        example: "locale date_fmt"
      - intent: "show all locale settings with keyword names"
        alternate_phrasings:
          - "locale -ck LC_TIME"
          - "show every setting in the time locale category with names"
          - "dump the LC_TIME locale variables"
        pattern: "locale -ck {category}"
        example: "locale -ck LC_TIME"
    key_flags:
      - flag: "-a / --all-locales"
        meaning: "Display a list of all available locales"
      - flag: "-m / --charmaps"
        meaning: "Display available character set description files"
      - flag: "-c / --category-name"
        meaning: "Print the locale category name before each keyword block"
      - flag: "-k / --keyword-name"
        meaning: "Print keyword names alongside their values (keyword=\"value\" format)"
      - flag: "-v / --verbose"
        meaning: "Include LC_IDENTIFICATION metadata for each locale when used with -a"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
