          - "how do I set up flatpak with Flathub"
          - "I can't find any flatpaks, how do I add the repo"
        pattern: "flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo"
        example: "flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo"

      - intent: "show information about an installed flatpak"
        alternate_phrasings:
          - "flatpak info {app-id}"
          - "show version and details of {application} flatpak"
          - "what version of {application} is installed as a flatpak"
        pattern: "flatpak info {com.example.App}"
        example: "flatpak info org.mozilla.firefox"

      - intent: "remove unused flatpak runtimes to free space"
        alternate_phrasings:
          - "flatpak remove --unused"
          - "clean up unused flatpak runtimes"
          - "flatpak is using too much disk space"
          - "delete orphaned flatpak components"
        pattern: "flatpak remove --unused"
        example: "flatpak remove --unused"

    key_flags:
