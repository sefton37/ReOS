          - "add the {application} flatpak"
        pattern: "flatpak install {remote} {com.example.App}"
        example: "flatpak install flathub org.gimp.GIMP"

      - intent: "remove a flatpak application"
        alternate_phrasings:
          - "flatpak uninstall {app-id}"
          - "remove the {application} flatpak"
          - "delete {application} flatpak"
          - "uninstall {application} that I installed via flatpak"
        pattern: "flatpak uninstall {com.example.App}"
