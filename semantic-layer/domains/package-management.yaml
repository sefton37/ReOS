    distro_notes:
      note: "flatpak works across distros; Flathub is the primary application source"
      fedora: "flatpak pre-installed; Flathub not enabled by default on some spins"
      ubuntu: "flatpak available but snapd is the default; must add Flathub manually"
      arch: "install flatpak via pacman -S flatpak; then add Flathub remote"

