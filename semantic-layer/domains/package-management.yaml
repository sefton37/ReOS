          - "what flatpak apps do I have"
          - "list my flatpak applications"
        pattern: "flatpak list --app"
        example: "flatpak list --app"

      - intent: "add Flathub as a remote source"
        alternate_phrasings:
          - "flatpak remote-add flathub"
