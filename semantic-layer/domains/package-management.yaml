  # ──────────────────────────────────────────────
  # snap  (Canonical universal package format)
  # ──────────────────────────────────────────────
  - name: snap
    description: "Install and manage sandboxed Snap packages; works across multiple Linux distros"
    common_intents:
      - intent: "install a snap package"
        alternate_phrasings:
          - "snap install {package}"
          - "install {package} via snap"
          - "get {package} as a snap"
          - "I want to install {package} from the snap store"
          - "add the {package} snap"
        pattern: "sudo snap install {package}"
        example: "sudo snap install vlc"

      - intent: "remove a snap package"
        alternate_phrasings:
          - "snap remove {package}"
          - "uninstall {package} snap"
          - "delete the {package} snap"
          - "get rid of the {package} snap"
        pattern: "sudo snap remove {package}"
        example: "sudo snap remove vlc"

      - intent: "update all snap packages"
        alternate_phrasings:
          - "snap refresh"
          - "update all snaps manually"
          - "upgrade my snap packages"
          - "my snaps are out of date"
        pattern: "sudo snap refresh"
        example: "sudo snap refresh"

      - intent: "update a specific snap package"
        alternate_phrasings:
          - "snap refresh {package}"
          - "update the {package} snap"
          - "upgrade just {package} snap"
        pattern: "sudo snap refresh {package}"
        example: "sudo snap refresh firefox"

      - intent: "list installed snaps"
        alternate_phrasings:
          - "snap list"
          - "show all installed snap packages"
          - "what snaps do I have"
        pattern: "snap list"
        example: "snap list"

      - intent: "search for a snap"
        alternate_phrasings:
          - "snap find {query}"
          - "search the snap store for {query}"
          - "is there a snap for {query}"
          - "look up {query} in the snap store"
        pattern: "snap find {query}"
        example: "snap find text editor"

      - intent: "revert a snap to its previous version"
        alternate_phrasings:
          - "snap revert {package}"
          - "undo the last snap update for {package}"
          - "go back to the previous version of the {package} snap"
          - "the new {package} snap broke, roll it back"
        pattern: "sudo snap revert {package}"
        example: "sudo snap revert firefox"

    key_flags:
      - flag: "--classic"
        meaning: "Install in classic confinement (bypasses snap sandbox; use only when required)"
      - flag: "--channel={channel}"
        meaning: "Install from a specific channel (stable, candidate, beta, edge)"
      - flag: "--dangerous"
        meaning: "Install a local snap file without signature verification"
      - flag: "--devmode"
        meaning: "Install in developer mode (bypasses sandbox; for testing only)"

    safety:
      level: moderate
      requires_sudo: true
      confirmation_required_for:
        - "snap install {package} --classic"
        - "snap install {package} --devmode"
        - "snap install {package} --dangerous"
        - "snap remove {package}"
      blocked_patterns:
        - "snap install --dangerous {untrusted_file}"

    undo:
      "snap install {package}": "sudo snap remove {package}"
      "snap remove {package}": "sudo snap install {package}"
      "snap refresh {package}": "sudo snap revert {package}"

    distro_notes:
      ubuntu: "snap is first-class and pre-installed"
      other_distros: "snapd daemon must be installed and running; not available on all distros"
      fedora_note: "snap works on Fedora via snapd; flatpak is often preferred"

    related_commands:
      - flatpak
      - apt

