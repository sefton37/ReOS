          - "view {file} with horizontal scrolling"
          - "stop less from wrapping wide lines"
          - "keep long lines intact in less"
        pattern: "less -S {file}"
        example: "less -S wide_output.tsv"
    key_flags:
      - flag: "-S / --chop-long-lines"
        meaning: "Do not wrap long lines; scroll horizontally instead"
      - flag: "-N / --LINE-NUMBERS"
        meaning: "Show line numbers"
      - flag: "-R / --RAW-CONTROL-CHARS"
        meaning: "Allow ANSI color codes to render (useful for colored output)"
      - flag: "+F"
        meaning: "Start in follow mode, like tail -f"
      - flag: "+/{pattern}"
        meaning: "Start at the first match for pattern"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
