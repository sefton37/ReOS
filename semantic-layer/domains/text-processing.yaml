      - intent: "concatenate multiple files"
        alternate_phrasings:
          - "cat {file1} {file2}"
          - "join {file1} and {file2} together"
          - "combine these files into one stream"
          - "merge the contents of {file1} and {file2}"
          - "print {file1} followed by {file2}"
        pattern: "cat {file1} {file2}"
        example: "cat header.txt body.txt footer.txt"
      - intent: "pipe a file into another command"
        alternate_phrasings:
          - "cat {file} | {command}"
          - "feed {file} into {command}"
          - "use {file} as input to {command}"
          - "read from {file} and pipe to {command}"
          - "stream {file} through {command}"
