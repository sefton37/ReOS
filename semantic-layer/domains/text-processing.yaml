          - "view {file} and start at the first match for {pattern}"
          - "open {file} with less and search for {pattern} right away"
          - "less and immediately find {pattern}"
        pattern: "less +/{pattern} {file}"
        example: "less +/error /var/log/auth.log"
      - intent: "follow a file in less (like tail -f)"
        alternate_phrasings:
