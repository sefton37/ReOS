domain: text-processing
description: "Searching, transforming, filtering, and analyzing text in files and streams"
related_domains:
  - file-operations
  - shell-operations

commands:
  - name: grep
    description: "Search for lines matching a pattern in files or stdin"
    common_intents:
      - intent: "search for a pattern in a file"
        alternate_phrasings:
          - "grep {pattern} {file}"
          - "find lines containing {pattern} in {file}"
          - "I need to find every line in {file} that mentions {pattern}"
          - "look for {pattern} in {file}"
          - "which lines in {file} have {pattern}"
        pattern: "grep '{pattern}' {file}"
        example: "grep 'error' /var/log/syslog"
      - intent: "search recursively in a directory"
        alternate_phrasings:
          - "grep -r"
          - "search all files under {directory} for {pattern}"
          - "find {pattern} anywhere inside {directory}"
          - "recursive grep"
          - "scan every file in {directory} for {pattern}"
        pattern: "grep -r '{pattern}' {directory}"
        example: "grep -r 'TODO' ~/dev/myproject"
      - intent: "case-insensitive search"
        alternate_phrasings:
          - "grep -i"
          - "find {pattern} regardless of uppercase or lowercase"
          - "search for {pattern} ignoring case"
          - "case insensitive grep"
          - "match {pattern} whether it's capitalized or not"
        pattern: "grep -i '{pattern}' {file}"
        example: "grep -i 'error' app.log"
      - intent: "show line numbers alongside matches"
        alternate_phrasings:
          - "grep -n"
          - "search for {pattern} and tell me which line numbers match"
          - "grep with line numbers"
          - "I need to know where in {file} the matches are"
          - "find {pattern} and show me the line number"
        pattern: "grep -n '{pattern}' {file}"
        example: "grep -n 'def main' script.py"
      - intent: "show lines that do NOT match a pattern"
        alternate_phrasings:
          - "grep -v"
          - "filter out lines containing {pattern}"
          - "exclude lines matching {pattern}"
          - "show me everything in {file} except {pattern}"
          - "invert grep, remove lines with {pattern}"
        pattern: "grep -v '{pattern}' {file}"
        example: "grep -v '^#' config.ini"
      - intent: "show context lines around each match"
        alternate_phrasings:
          - "grep -C {n}"
          - "search for {pattern} and show {n} lines before and after"
          - "find {pattern} with surrounding context"
          - "I want to see what's around the matching lines"
          - "grep with {n} lines of context"
        pattern: "grep -C {n} '{pattern}' {file}"
        example: "grep -C 3 'exception' app.log"
      - intent: "count the number of matching lines"
        alternate_phrasings:
          - "grep -c"
          - "how many lines in {file} match {pattern}"
          - "count occurrences of {pattern} in {file}"
          - "just give me the number of matches"
          - "I don't need the lines, just the count"
        pattern: "grep -c '{pattern}' {file}"
        example: "grep -c 'ERROR' server.log"
      - intent: "list only filenames that contain a match"
        alternate_phrasings:
          - "grep -l"
          - "which files contain {pattern}"
          - "find files that have {pattern} somewhere in them"
          - "just give me the filenames, not the matching lines"
          - "show me which files match, I don't need the content"
        pattern: "grep -rl '{pattern}' {directory}"
        example: "grep -rl 'import os' ~/dev"
      - intent: "search using extended regex"
        alternate_phrasings:
          - "grep -E"
          - "use extended regular expressions with grep"
          - "grep with egrep syntax"
          - "search for {pattern} using | or + or ? in the regex"
          - "grep with full regex support"
        pattern: "grep -E '{extended_pattern}' {file}"
        example: "grep -E 'error|warning|fatal' app.log"
      - intent: "print only the matching portion of each line"
        alternate_phrasings:
          - "grep -o"
          - "extract just the part that matches {pattern}"
          - "show only the matched text, not the whole line"
          - "I want the matched strings only"
          - "pull out matching substrings from {file}"
        pattern: "grep -o '{pattern}' {file}"
        example: 'grep -oE ''[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'' access.log'
    key_flags:
      - flag: "-r / --recursive"
        meaning: "Search all files under the given directory recursively"
      - flag: "-i / --ignore-case"
        meaning: "Case-insensitive matching"
      - flag: "-n / --line-number"
        meaning: "Print line number before each match"
      - flag: "-v / --invert-match"
        meaning: "Select lines that do NOT match"
      - flag: "-l / --files-with-matches"
        meaning: "Print only names of files that contain at least one match"
      - flag: "-c / --count"
        meaning: "Print count of matching lines per file"
      - flag: "-o / --only-matching"
        meaning: "Print only the matched part of each line"
      - flag: "-E / --extended-regexp"
        meaning: "Use extended regex (enables +, ?, |, {}, ())"
      - flag: "-F / --fixed-strings"
        meaning: "Treat pattern as a literal string, not a regex"
      - flag: "-A {n} / --after-context"
        meaning: "Show n lines after each match"
      - flag: "-B {n} / --before-context"
        meaning: "Show n lines before each match"
      - flag: "-C {n} / --context"
        meaning: "Show n lines before and after each match"
      - flag: "-H / --with-filename"
        meaning: "Always print the filename before each match"
      - flag: "-I"
        meaning: "Ignore binary files"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - awk
      - sed
      - ripgrep

  - name: sed
    description: "Stream editor — search and replace, delete lines, and transform text"
    common_intents:
      - intent: "replace text in a stream or file (print to stdout)"
        alternate_phrasings:
          - "sed s//"
          - "substitute {old} with {new} in {file}"
          - "do a find and replace on {file} but just show the output"
          - "replace all occurrences of {old} with {new}"
          - "swap {old} for {new} in the output"
        pattern: "sed 's/{old}/{new}/g' {file}"
        example: "sed 's/foo/bar/g' config.txt"
      - intent: "replace text in a file in-place"
        alternate_phrasings:
          - "sed -i"
          - "find and replace {old} with {new} directly in {file}"
          - "edit {file} in place, replacing {old} with {new}"
          - "permanently replace {old} with {new} in {file}"
          - "rewrite {file} with {old} changed to {new}"
        pattern: "sed -i 's/{old}/{new}/g' {file}"
        example: "sed -i 's/localhost/production.host/g' settings.conf"
      - intent: "delete lines matching a pattern"
        alternate_phrasings:
          - "sed /pattern/d"
          - "remove all lines containing {pattern} from {file}"
          - "strip out lines matching {pattern}"
          - "delete blank lines from {file}"
          - "filter out {pattern} lines"
        pattern: "sed '/{pattern}/d' {file}"
        example: "sed '/^#/d' config.ini"
      - intent: "print a specific line or range of lines"
        alternate_phrasings:
          - "sed -n '{n}p'"
          - "show only line {n} of {file}"
          - "print lines {start} through {end} of {file}"
          - "extract a range of lines with sed"
          - "get just line {n} from {file}"
        pattern: "sed -n '{start},{end}p' {file}"
        example: "sed -n '10,20p' large_file.txt"
    key_flags:
      - flag: "-i / --in-place"
        meaning: "Edit the file in place instead of printing to stdout"
      - flag: "-n / --quiet"
        meaning: "Suppress default output; use with p to print specific lines"
      - flag: "-e {script}"
        meaning: "Add a script/expression to run"
      - flag: "-f {script_file}"
        meaning: "Read sed commands from a file"
    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for:
        - "sed -i (modifies file in place)"
      blocked_patterns: []
    undo: "No automatic undo; back up file before using sed -i (use sed -i.bak to keep a backup)"
    related_commands:
      - awk
      - grep
      - tr

  - name: awk
    description: "Pattern-scanning and text-processing language for columnar and structured text"
    common_intents:
      - intent: "print a specific column from whitespace-delimited text"
        alternate_phrasings:
          - "awk '{print $N}'"
          - "extract the {n}th field from each line of {file}"
          - "show column {n} of {file}"
          - "get the second word on every line"
          - "pull out field {n} from the output"
        pattern: "awk '{print ${column}}' {file}"
        example: "awk '{print $2}' /etc/passwd"
      - intent: "use a custom field separator"
        alternate_phrasings:
          - "awk -F"
          - "split on {delimiter} and print column {n}"
          - "parse {file} using {delimiter} as the separator"
          - "the fields are separated by {delimiter}, give me column {n}"
          - "awk with comma delimiter"
        pattern: "awk -F '{delimiter}' '{print ${column}}' {file}"
        example: "awk -F ':' '{print $1}' /etc/passwd"
      - intent: "print lines that match a pattern"
        alternate_phrasings:
          - "awk '/pattern/'"
          - "filter lines matching {pattern} using awk"
          - "print only rows where the line contains {pattern}"
          - "awk grep equivalent"
          - "show lines that match {pattern} with awk"
        pattern: "awk '/{pattern}/' {file}"
        example: "awk '/ERROR/' app.log"
      - intent: "sum values in a column"
        alternate_phrasings:
          - "awk sum"
          - "add up all the numbers in column {n} of {file}"
          - "total the values in field {n}"
          - "calculate the sum of column {n}"
          - "aggregate column {n} in {file}"
        pattern: "awk '{sum += ${column}} END {print sum}' {file}"
        example: "awk '{sum += $3} END {print sum}' sales.txt"
      - intent: "print last column of each line"
        alternate_phrasings:
          - "awk '{print $NF}'"
          - "get the last field of every line"
          - "show the final column regardless of how many columns there are"
          - "print the last word on each line"
          - "extract the rightmost field from {file}"
        pattern: "awk '{print $NF}' {file}"
        example: "awk '{print $NF}' paths.txt"
    key_flags:
      - flag: "-F {delimiter}"
        meaning: "Set the input field separator character"
      - flag: "-v {var}={value}"
        meaning: "Assign a variable before execution begins"
      - flag: "-f {script_file}"
        meaning: "Read awk program from a file"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - sed
      - grep
      - cut

  - name: cut
    description: "Extract specific byte ranges, character positions, or delimited fields from each line"
    common_intents:
      - intent: "extract a specific field by delimiter"
        alternate_phrasings:
          - "cut -d -f"
          - "split on {delimiter} and get field {n} from each line"
          - "parse {file} and extract column {n} using {delimiter}"
          - "get field {n} from a {delimiter}-separated file"
          - "pull the {n}th column from a delimited file"
        pattern: "cut -d '{delimiter}' -f {n} {file}"
        example: "cut -d ':' -f 1 /etc/passwd"
      - intent: "extract a range of fields"
        alternate_phrasings:
          - "cut -f {start}-{end}"
          - "get fields {start} through {end} from {file}"
          - "extract columns {start} to {end} using cut"
          - "give me fields {start}-{end} of each line"
          - "slice fields {start} to {end} from the output"
        pattern: "cut -d '{delimiter}' -f {start}-{end} {file}"
        example: "cut -d ',' -f 2-4 data.csv"
      - intent: "extract specific character positions"
        alternate_phrasings:
          - "cut -c"
          - "get characters {n} through {m} of each line"
          - "extract a fixed-width column by character position"
          - "slice characters {start} to {end} from each line"
          - "cut by character position not delimiter"
        pattern: "cut -c {start}-{end} {file}"
        example: "cut -c 1-8 fixed_width.txt"
    key_flags:
      - flag: "-d {delimiter}"
        meaning: "Use this character as the field delimiter (default is TAB)"
      - flag: "-f {fields}"
        meaning: "Select only these fields; ranges like 2-5 and lists like 1,3 are supported"
      - flag: "-c {characters}"
        meaning: "Select only these character positions"
      - flag: "-s / --only-delimited"
        meaning: "Skip lines that do not contain the delimiter"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - awk
      - paste
      - tr

  - name: sort
    description: "Sort lines of text files alphabetically, numerically, or by field"
    common_intents:
      - intent: "sort a file alphabetically"
        alternate_phrasings:
          - "sort {file}"
          - "alphabetize the lines in {file}"
          - "put {file} in order"
          - "sort the contents of {file}"
          - "order lines in {file} from A to Z"
        pattern: "sort {file}"
        example: "sort names.txt"
      - intent: "sort in reverse order"
        alternate_phrasings:
          - "sort -r"
          - "sort {file} from Z to A"
          - "reverse sort {file}"
          - "sort descending"
          - "sort {file} backwards"
        pattern: "sort -r {file}"
        example: "sort -r names.txt"
      - intent: "sort numerically"
        alternate_phrasings:
          - "sort -n"
          - "sort {file} by number not alphabetically"
          - "numeric sort"
          - "sort these numbers properly, not lexicographically"
          - "sort {file} treating values as integers"
        pattern: "sort -n {file}"
        example: "sort -n scores.txt"
      - intent: "sort by a specific field"
        alternate_phrasings:
          - "sort -k"
          - "sort {file} by column {n}"
          - "sort on the {n}th field using {delimiter} as separator"
          - "order {file} by a specific column"
          - "sort using field {n} as the key"
        pattern: "sort -t '{delimiter}' -k {n} {file}"
        example: "sort -t ':' -k 3n /etc/passwd"
      - intent: "remove duplicate lines while sorting"
        alternate_phrasings:
          - "sort -u"
          - "sort and deduplicate {file}"
          - "sort {file} keeping only unique lines"
          - "sort unique"
          - "combine sort and uniq in one step"
        pattern: "sort -u {file}"
        example: "sort -u words.txt"
    key_flags:
      - flag: "-r / --reverse"
        meaning: "Sort in descending order"
      - flag: "-n / --numeric-sort"
        meaning: "Compare according to numerical value"
      - flag: "-k {pos} / --key"
        meaning: "Sort on the field starting at position pos"
      - flag: "-t {char} / --field-separator"
        meaning: "Use char as the field delimiter"
      - flag: "-u / --unique"
        meaning: "Output only unique lines"
      - flag: "-f / --ignore-case"
        meaning: "Case-insensitive sort"
      - flag: "-R / --random-sort"
        meaning: "Shuffle lines in random order"
      - flag: "-o {file}"
        meaning: "Write output to file instead of stdout (can sort in-place)"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - uniq
      - comm

  - name: uniq
    description: "Report or filter out adjacent repeated lines in sorted input"
    common_intents:
      - intent: "remove duplicate lines from sorted input"
        alternate_phrasings:
          - "sort | uniq"
          - "deduplicate lines in {file}"
          - "get unique lines from {file}"
          - "remove duplicate lines"
          - "I want each unique line only once"
        pattern: "sort {file} | uniq"
        example: "sort words.txt | uniq"
      - intent: "count occurrences of each line"
        alternate_phrasings:
          - "uniq -c"
          - "count how many times each line appears in {file}"
          - "show frequency of each unique line"
          - "get a count for each duplicate"
          - "how often does each value appear"
        pattern: "sort {file} | uniq -c"
        example: "sort access.log | uniq -c"
      - intent: "show only lines that appear more than once"
        alternate_phrasings:
          - "uniq -d"
          - "show only duplicated lines in {file}"
          - "which lines appear more than once"
          - "find duplicate lines"
          - "show me the repeated lines"
        pattern: "sort {file} | uniq -d"
        example: "sort emails.txt | uniq -d"
      - intent: "show lines appearing exactly once"
        alternate_phrasings:
          - "uniq -u"
          - "show lines that are not duplicated in {file}"
          - "find lines unique to this file"
          - "which lines appear only once"
          - "filter out any line that has a duplicate"
        pattern: "sort {file} | uniq -u"
        example: "sort items.txt | uniq -u"
      - intent: "count and sort by most frequent"
        alternate_phrasings:
          - "sort | uniq -c | sort -rn"
          - "rank lines in {file} by frequency"
          - "what are the most common values in {file}"
          - "frequency count sorted by most common first"
          - "top N most frequent lines"
        pattern: "sort {file} | uniq -c | sort -rn"
        example: "sort access.log | uniq -c | sort -rn | head -20"
    key_flags:
      - flag: "-c / --count"
        meaning: "Prefix each output line with its occurrence count"
      - flag: "-d / --repeated"
        meaning: "Only print lines that appear more than once"
      - flag: "-u / --unique"
        meaning: "Only print lines that appear exactly once"
      - flag: "-i / --ignore-case"
        meaning: "Case-insensitive comparison"
      - flag: "-w {n} / --check-chars"
        meaning: "Compare only the first n characters"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - sort
      - comm

  - name: wc
    description: "Count lines, words, characters, or bytes in files or stdin"
    common_intents:
      - intent: "count lines in a file"
        alternate_phrasings:
          - "wc -l"
          - "how many lines does {file} have"
          - "line count of {file}"
          - "tell me the number of lines in {file}"
          - "how long is {file}"
        pattern: "wc -l {file}"
        example: "wc -l /var/log/syslog"
      - intent: "count words in a file"
        alternate_phrasings:
          - "wc -w"
          - "how many words are in {file}"
          - "word count of {file}"
          - "count the words in {file}"
          - "how many words did I write"
        pattern: "wc -w {file}"
        example: "wc -w essay.txt"
      - intent: "count bytes in a file"
        alternate_phrasings:
          - "wc -c"
          - "what is the byte size of {file}"
          - "how many bytes in {file}"
          - "get file size in bytes using wc"
          - "byte count of {file}"
        pattern: "wc -c {file}"
        example: "wc -c archive.tar"
      - intent: "count matching lines from grep output"
        alternate_phrasings:
          - "grep | wc -l"
          - "how many lines match {pattern} in {file}"
          - "count the results of a grep"
          - "how many matches does grep return"
          - "number of times {pattern} appears in {file}"
        pattern: "grep '{pattern}' {file} | wc -l"
        example: "grep 'ERROR' app.log | wc -l"
    key_flags:
      - flag: "-l / --lines"
        meaning: "Count lines"
      - flag: "-w / --words"
        meaning: "Count words"
      - flag: "-c / --bytes"
        meaning: "Count bytes"
      - flag: "-m / --chars"
        meaning: "Count characters (respects multi-byte encodings)"
      - flag: "-L / --max-line-length"
        meaning: "Print length of the longest line"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - grep
      - awk

  - name: tr
    description: "Translate, delete, or squeeze characters in a stream"
    common_intents:
      - intent: "convert lowercase to uppercase"
        alternate_phrasings:
          - "tr '[:lower:]' '[:upper:]'"
          - "uppercase the text in {file}"
          - "convert {file} to all caps"
          - "make everything uppercase"
          - "upcase the output"
        pattern: "tr '[:lower:]' '[:upper:]' < {file}"
        example: "tr '[:lower:]' '[:upper:]' < names.txt"
      - intent: "replace a character with another"
        alternate_phrasings:
          - "tr old_char new_char"
          - "replace every {char} with {replacement} in the stream"
          - "swap character {char} for {replacement}"
          - "translate {char} to {replacement}"
          - "change all {char} characters to {replacement}"
        pattern: "tr '{find_char}' '{replace_char}' < {file}"
        example: "echo $PATH | tr ':' '\\n'"
      - intent: "delete specific characters"
        alternate_phrasings:
          - "tr -d"
          - "remove all {char} characters from the input"
          - "strip out {chars} from the stream"
          - "delete every occurrence of {chars}"
          - "get rid of all {char} in the output"
        pattern: "tr -d '{chars}' < {file}"
        example: "tr -d '\\r' < windows_file.txt"
      - intent: "squeeze repeated characters to one"
        alternate_phrasings:
          - "tr -s"
          - "collapse multiple consecutive spaces into one"
          - "squeeze repeated {char} down to a single {char}"
          - "remove runs of duplicate characters"
          - "compress repeated whitespace"
        pattern: "tr -s '{char}' < {file}"
        example: "tr -s ' ' < padded.txt"
    key_flags:
      - flag: "-d / --delete"
        meaning: "Delete characters in the first set, do not translate"
      - flag: "-s / --squeeze-repeats"
        meaning: "Replace sequences of a repeated character with a single instance"
      - flag: "-c / --complement"
        meaning: "Use the complement of the first set"
      - flag: "[:lower:] / [:upper:] / [:digit:] / [:space:]"
        meaning: "POSIX character classes for use in sets"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - sed
      - cut

  - name: head
    description: "Print the first N lines or bytes of a file or stream"
    common_intents:
      - intent: "show the first N lines of a file"
        alternate_phrasings:
          - "head -n {n}"
          - "print the first {n} lines of {file}"
          - "show me the top {n} lines of {file}"
          - "peek at the beginning of {file}"
          - "what does the start of {file} look like"
        pattern: "head -n {n} {file}"
        example: "head -n 20 /var/log/auth.log"
      - intent: "show the first 10 lines (default)"
        alternate_phrasings:
          - "head {file}"
          - "show the beginning of {file}"
          - "quick look at {file}"
          - "preview {file}"
          - "first few lines of {file}"
        pattern: "head {file}"
        example: "head config.yaml"
      - intent: "show first N bytes of a file"
        alternate_phrasings:
          - "head -c"
          - "print the first {n} bytes of {file}"
          - "show {n} bytes from the start of {file}"
          - "peek at first {n} bytes"
          - "read {n} bytes from the beginning of {file}"
        pattern: "head -c {n} {file}"
        example: "head -c 512 binary_file.bin"
    key_flags:
      - flag: "-n {n} / --lines"
        meaning: "Print the first n lines (default 10)"
      - flag: "-c {n} / --bytes"
        meaning: "Print the first n bytes"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - tail
      - less
      - cat

  - name: tail
    description: "Print the last N lines or bytes of a file, or follow a file as it grows"
    common_intents:
      - intent: "show the last N lines of a file"
        alternate_phrasings:
          - "tail -n {n}"
          - "print the last {n} lines of {file}"
          - "show me the end of {file}"
          - "get the bottom {n} lines of {file}"
          - "what does the end of {file} look like"
        pattern: "tail -n {n} {file}"
        example: "tail -n 50 /var/log/nginx/error.log"
      - intent: "follow a file in real time (tail -f)"
        alternate_phrasings:
          - "tail -f"
          - "watch {file} as it updates"
          - "stream new lines from {file} live"
          - "follow {file} — keep showing new output"
          - "live tail {file}"
        pattern: "tail -f {file}"
        example: "tail -f /var/log/syslog"
      - intent: "follow a file and survive log rotation"
        alternate_phrasings:
          - "tail -F"
          - "tail {file} even if it gets rotated"
          - "follow {file} and reopen if it disappears and comes back"
          - "persistent tail that handles log rotation"
          - "tail -F for log rotation"
        pattern: "tail -F {file}"
        example: "tail -F /var/log/app/app.log"
      - intent: "print all lines starting from line N"
        alternate_phrasings:
          - "tail -n +{n}"
          - "skip the first {n} lines of {file} and show the rest"
          - "print {file} starting at line {n}"
          - "output {file} from line {n} onward"
          - "drop the first {n} lines"
        pattern: "tail -n +{n} {file}"
        example: "tail -n +2 data.csv"
    key_flags:
      - flag: "-n {n} / --lines"
        meaning: "Print the last n lines (default 10)"
      - flag: "-f / --follow"
        meaning: "Keep the file open and print new lines as they are written"
      - flag: "-F / --retry --follow"
