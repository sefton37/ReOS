      - flag: "-b / --number-nonblank"
        meaning: "Number non-empty output lines"
      - flag: "-A / --show-all"
        meaning: "Show non-printing characters (helpful for diagnosing invisible whitespace)"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
