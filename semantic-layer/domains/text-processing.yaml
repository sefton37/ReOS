  - name: paste
    description: "Merge lines from multiple files side by side, or join all lines of a file"
    common_intents:
      - intent: "merge two files side by side"
        alternate_phrasings:
          - "paste {file1} {file2}"
          - "combine {file1} and {file2} column by column"
          - "put {file1} and {file2} next to each other"
          - "zip lines from {file1} and {file2} into one file"
          - "side-by-side merge of {file1} and {file2}"
        pattern: "paste {file1} {file2}"
        example: "paste names.txt scores.txt"
      - intent: "merge all lines of a file into a single line"
        alternate_phrasings:
          - "paste -s"
