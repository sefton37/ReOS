          - "read {file} interactively"
          - "browse {file} without loading all of it"
        pattern: "less {file}"
        example: "less /var/log/syslog"
      - intent: "open a file and search for a pattern immediately"
        alternate_phrasings:
          - "less +/{pattern}"
