      - intent: "merge files with a custom delimiter"
        alternate_phrasings:
          - "paste -d {delimiter}"
          - "combine {file1} and {file2} using {delimiter} between columns"
          - "paste files side by side with {delimiter} as separator"
          - "merge files with a comma separator"
          - "paste with a specific delimiter"
        pattern: "paste -d '{delimiter}' {file1} {file2}"
        example: "paste -d ',' first_names.txt last_names.txt"
    key_flags:
      - flag: "-d {delimiter}"
        meaning: "Use this delimiter between merged columns (default is TAB)"
      - flag: "-s / --serial"
        meaning: "Paste one file at a time, merging lines serially rather than in parallel"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - cut
      - join
      - column

  - name: comm
    description: "Compare two sorted files and show lines unique to each or common to both"
    common_intents:
      - intent: "find lines common to two files"
        alternate_phrasings:
          - "comm -12"
          - "what lines appear in both {file1} and {file2}"
          - "find the intersection of {file1} and {file2}"
          - "show lines present in both files"
          - "lines that {file1} and {file2} share"
        pattern: "comm -12 <(sort {file1}) <(sort {file2})"
        example: "comm -12 <(sort list_a.txt) <(sort list_b.txt)"
      - intent: "find lines only in the first file"
        alternate_phrasings:
          - "comm -23"
          - "what lines are in {file1} but not {file2}"
          - "lines unique to {file1}"
          - "show lines that {file1} has but {file2} doesn't"
          - "subtract {file2} from {file1}"
        pattern: "comm -23 <(sort {file1}) <(sort {file2})"
        example: "comm -23 <(sort all_users.txt) <(sort active_users.txt)"
      - intent: "find lines only in the second file"
        alternate_phrasings:
          - "comm -13"
          - "what lines are in {file2} but not {file1}"
          - "lines unique to {file2}"
          - "show lines added in {file2} that aren't in {file1}"
          - "find new entries in {file2}"
        pattern: "comm -13 <(sort {file1}) <(sort {file2})"
        example: "comm -13 <(sort old_list.txt) <(sort new_list.txt)"
    key_flags:
      - flag: "-1"
        meaning: "Suppress the column of lines unique to the first file"
      - flag: "-2"
        meaning: "Suppress the column of lines unique to the second file"
      - flag: "-3"
        meaning: "Suppress the column of lines common to both files"
      - flag: "-12 (combined)"
        meaning: "Show only lines common to both files"
      - flag: "-23 (combined)"
        meaning: "Show only lines unique to the first file"
      - flag: "-13 (combined)"
        meaning: "Show only lines unique to the second file"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - diff
      - sort
      - uniq

  - name: jq
    description: "Query, filter, and transform JSON data using a lightweight DSL"
    common_intents:
      - intent: "pretty-print JSON"
        alternate_phrasings:
          - "jq ."
          - "format {file} as readable JSON"
          - "pretty print the JSON in {file}"
          - "make this JSON output human-readable"
          - "indent and colorize the JSON"
        pattern: "jq '.' {file}"
        example: "jq '.' response.json"
      - intent: "extract a specific field from JSON"
        alternate_phrasings:
          - "jq '.field'"
          - "get the value of {key} from the JSON"
          - "extract field {key} from {file}"
          - "I just want the {key} field out of this JSON"
          - "pull {key} from the JSON object"
        pattern: "jq '.{key}' {file}"
        example: "jq '.name' user.json"
      - intent: "extract a field from every object in a JSON array"
        alternate_phrasings:
          - "jq '.[].field'"
          - "get {key} from each item in the array"
          - "list the {key} of every element"
          - "pull {key} out of all the objects in the array"
          - "iterate over the JSON array and print {key} for each"
        pattern: "jq '.[].{key}' {file}"
        example: "jq '.[].name' users.json"
      - intent: "filter array items by a field value"
        alternate_phrasings:
          - "jq 'select'"
          - "show only objects where {key} equals {value}"
          - "filter the JSON array where {key} is {value}"
          - "find records in the JSON where {key} = {value}"
          - "query JSON for objects with {key} matching {value}"
        pattern: "jq '.[] | select(.{key} == \"{value}\")' {file}"
        example: "jq '.[] | select(.status == \"active\")' users.json"

      - intent: "extract a nested field"
        alternate_phrasings:
          - "jq '.parent.child'"
          - "get the nested value at {parent}.{child}"
          - "access {child} inside {parent} in the JSON"
          - "drill into the JSON to get {path}"
          - "navigate the JSON path {parent}.{child}"
        pattern: "jq '.{parent}.{child}' {file}"
        example: "jq '.user.address.city' profile.json"
      - intent: "pipe jq output from curl or another command"
        alternate_phrasings:
          - "curl | jq"
          - "format the JSON response from {command} with jq"
          - "pipe API output through jq"
          - "pretty print the API response"
          - "curl something and extract {field} with jq"
        pattern: "{command} | jq '.{field}'"
        example: "curl -s https://api.example.com/status | jq '.version'"
      - intent: "compact JSON output (no whitespace)"
        alternate_phrasings:
          - "jq -c"
          - "output JSON on a single line"
          - "compact JSON for passing to another tool"
          - "minify the JSON"
          - "remove whitespace from JSON output"
        pattern: "jq -c '.' {file}"
        example: "jq -c '.[]' records.json"
    key_flags:
      - flag: "-r / --raw-output"
        meaning: "Output strings without JSON quotes (useful for piping to shell commands)"
      - flag: "-c / --compact-output"
        meaning: "Output each result on one line with no extra whitespace"
      - flag: "-e / --exit-status"
        meaning: "Set exit status based on the last output value (false/null = exit 1)"
      - flag: "-s / --slurp"
        meaning: "Read all inputs into an array before applying filter"
      - flag: "-n / --null-input"
        meaning: "Use null as input; useful for constructing JSON from scratch"
      - flag: "--arg {name} {value}"
        meaning: "Pass a shell string value as a named jq variable"
      - flag: "-f {file}"
        meaning: "Read filter from a file instead of command line"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - grep
      - awk
      - python3
