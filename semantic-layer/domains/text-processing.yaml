  - name: diff
    description: "Compare two files or directories and show the differences"
    common_intents:
      - intent: "compare two files"
        alternate_phrasings:
          - "diff {file1} {file2}"
          - "what's different between {file1} and {file2}"
          - "show changes between {file1} and {file2}"
          - "find differences in two files"
          - "compare {file1} to {file2}"
        pattern: "diff {file1} {file2}"
        example: "diff old_config.conf new_config.conf"
      - intent: "compare files in unified diff format"
        alternate_phrasings:
          - "diff -u"
          - "show a unified diff of {file1} and {file2}"
          - "git-style diff between {file1} and {file2}"
          - "diff with context in unified format"
          - "diff output I can read like a patch"
        pattern: "diff -u {file1} {file2}"
        example: "diff -u original.py modified.py"
      - intent: "compare two directories recursively"
        alternate_phrasings:
          - "diff -r"
          - "what files differ between {dir1} and {dir2}"
          - "compare directories {dir1} and {dir2}"
          - "show differences between two directory trees"
          - "recursive diff on two folders"
        pattern: "diff -r {dir1} {dir2}"
        example: "diff -r /etc/nginx /etc/nginx.bak"
      - intent: "check if two files are identical"
        alternate_phrasings:
          - "diff -q"
          - "are {file1} and {file2} the same"
          - "just tell me if {file1} and {file2} differ, no details"
          - "quickly check if two files match"
          - "do these two files have the same content"
        pattern: "diff -q {file1} {file2}"
        example: "diff -q checksum.txt checksum_verify.txt"
      - intent: "ignore whitespace differences"
        alternate_phrasings:
          - "diff -w"
          - "compare {file1} and {file2} ignoring whitespace"
          - "diff but ignore spaces and tabs"
          - "compare without caring about indentation"
          - "diff that doesn't flag whitespace-only changes"
        pattern: "diff -w {file1} {file2}"
        example: "diff -w formatted.py unformatted.py"
    key_flags:
      - flag: "-u / --unified"
        meaning: "Output in unified format (shows context lines, readable by patch)"
      - flag: "-r / --recursive"
        meaning: "Recursively compare subdirectories"
      - flag: "-q / --brief"
        meaning: "Report only whether files differ, not the details"
      - flag: "-w / --ignore-all-space"
        meaning: "Ignore all white space when comparing"
      - flag: "-i / --ignore-case"
        meaning: "Ignore case differences in file contents"
      - flag: "-y / --side-by-side"
        meaning: "Output in two columns"
      - flag: "-N / --new-file"
        meaning: "Treat absent files as empty (useful for patch generation)"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo: null
    related_commands:
      - comm
      - patch
      - vimdiff

  - name: tee
    description: "Read from stdin and write to both stdout and one or more files simultaneously"
    common_intents:
      - intent: "capture output to a file while still seeing it on screen"
        alternate_phrasings:
          - "tee {file}"
          - "save the output of {command} to {file} and also print it"
          - "log output to {file} while watching it in the terminal"
          - "I want to pipe output to the next command AND save it"
          - "split the output — screen and file at the same time"
        pattern: "{command} | tee {file}"
        example: "make 2>&1 | tee build.log"
      - intent: "append output to a file rather than overwriting"
        alternate_phrasings:
          - "tee -a"
          - "add to {file} instead of replacing it"
          - "append output to {file} while still printing to screen"
          - "tee but don't overwrite the existing file"
          - "accumulate output in {file}"
        pattern: "{command} | tee -a {file}"
        example: "echo 'new entry' | tee -a log.txt"
    key_flags:
      - flag: "-a / --append"
        meaning: "Append to the given files rather than overwriting"
    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for:
        - "tee without -a overwrites the destination file"
      blocked_patterns: []
    undo: "No undo for file overwrite; use tee -a to preserve existing content"
    related_commands:
      - cat
      - grep
      - tail

  - name: cat
    description: "Print and concatenate files to stdout"
    common_intents:
