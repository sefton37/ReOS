domain: process-management
description: "Process listing, monitoring, signaling, priority management, and job control"
related_domains:
  - service-management
  - system-info
  - logging

commands:
  - name: ps
    description: "Report a snapshot of currently running processes"
    common_intents:
      - intent: "show all running processes"
        alternate_phrasings:
          - "ps aux"
          - "what is running on this machine right now"
          - "my system is sluggish and I want to see every process that is currently active"
          - "something is hogging resources, show me everything"
          - "list all processes"
        pattern: "ps aux"
        example: "ps aux"
        followup: "grep for a specific process name"
      - intent: "show all running processes with full command string"
        alternate_phrasings:
          - "ps auxww"
          - "show me the full command line for every process, not just the truncated name"
          - "the command is getting cut off in ps output"
          - "show complete args"
        pattern: "ps auxww"
        example: "ps auxww"
      - intent: "search for a process by name"
        alternate_phrasings:
          - "is nginx running"
          - "I need to find out if a specific process is alive and get its PID"
          - "where is that process"
          - "find pid of {process_name}"
          - "check if {process_name} is up"
        pattern: "ps aux | grep '[{first_letter}]{rest_of_name}'"
        example: "ps aux | grep '[h]ttpd'"
        followup: "kill {pid}"
      - intent: "list processes owned by a specific user"
        alternate_phrasings:
          - "what is alice running"
          - "show me every process that belongs to a particular user account"
          - "what processes does {username} have open"
          - "processes for user {username}"
        pattern: "ps -u {username} -F"
        example: "ps -u alice -F"
      - intent: "show processes as a tree to see parent-child relationships"
        alternate_phrasings:
          - "ps axjf"
          - "show parent child relationship between processes"
          - "which process spawned that other process"
          - "process hierarchy"
        pattern: "ps axjf"
        example: "ps axjf"
      - intent: "get the parent PID of a process"
        alternate_phrasings:
          - "who spawned PID {pid}"
          - "what started that process"
          - "find ppid of {pid}"
        pattern: "ps -o ppid= -p {pid}"
        example: "ps -o ppid= -p 1234"
      - intent: "sort processes by memory usage"
        alternate_phrasings:
          - "what is eating all my RAM"
          - "show biggest memory consumers"
          - "something is using all my memory, what is it"
          - "sort by RSS"
        pattern: "ps --sort size"
        example: "ps --sort size"
      - intent: "show processes with custom output columns"
        alternate_phrasings:
          - "ps with specific fields"
          - "I only want pid user and command in ps output"
          - "custom ps columns"
        pattern: "ps -eo pid,user,command"
        example: "ps -eo pid,user,command"
    key_flags:
      - flag: "a"
        meaning: "Show processes for all users (BSD syntax)"
      - flag: "u"
        meaning: "Display user-oriented format showing owner, CPU, memory"
      - flag: "x"
        meaning: "Include processes not attached to a terminal"
      - flag: "-e"
        meaning: "Select all processes (UNIX syntax equivalent of aux)"
      - flag: "-f"
        meaning: "Full-format listing including PPID, STIME, and full command"
      - flag: "-o {format}"
        meaning: "User-defined output format (e.g. pid,user,command)"
      - flag: "--sort {key}"
        meaning: "Sort output by specified column (e.g. size, pcpu, pid)"
      - flag: "f"
        meaning: "Show process hierarchy as ASCII art tree (BSD syntax)"
      - flag: "-F"
        meaning: "Extra full format; adds SZ, RSS, PSR columns"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "ps is read-only; no undo required"
    related_commands:
      - top
      - htop
      - pgrep
      - lsof

  - name: top
    description: "Display dynamic real-time information about running processes"
    common_intents:
      - intent: "monitor running processes in real time"
        alternate_phrasings:
          - "top"
          - "what is my system doing right now"
          - "my computer is really slow and I want to watch what is happening live"
          - "live process view"
          - "system is crawling, show me what is running"
        pattern: "top"
        example: "top"
      - intent: "show processes sorted by CPU usage"
        alternate_phrasings:
          - "what is eating my CPU"
          - "I need to identify which process is consuming the most CPU cycles on this machine"
          - "my laptop sounds like a jet engine, what is running"
          - "sort by CPU"
          - "system is crawling, show me what is using all the processing power"
        pattern: "top -o %CPU"
        example: "top -o %CPU"
      - intent: "watch processes for a specific user"
        alternate_phrasings:
          - "show only {username} processes in top"
          - "filter top to a single user"
          - "what is www-data running"
        pattern: "top -u {username}"
        example: "top -u www-data"
      - intent: "hide idle and zombie processes"
        alternate_phrasings:
          - "too much noise in top output"
          - "only show active processes in top"
          - "suppress sleeping processes"
        pattern: "top -i"
        example: "top -i"
      - intent: "monitor threads of a specific process"
        alternate_phrasings:
          - "show threads for pid {pid}"
          - "I want to see individual threads not just the process"
          - "thread-level view of a process"
        pattern: "top -Hp {pid}"
        example: "top -Hp 1234"
      - intent: "watch only specific processes by PID"
        alternate_phrasings:
          - "top for pid {pid}"
          - "monitor just these two processes"
          - "narrow top to specific pids"
        pattern: "top -p {pid1},{pid2}"
        example: "top -p 1234,5678"
    key_flags:
      - flag: "-u {username}"
        meaning: "Show only processes owned by the given user"
      - flag: "-i"
        meaning: "Toggle display of idle/zombie processes"
      - flag: "-o {field}"
        meaning: "Sort by the named field (overrides default sort)"
      - flag: "-p {pid}"
        meaning: "Monitor specific PID(s), comma-separated"
      - flag: "-H"
        meaning: "Show individual threads rather than collapsed processes"
      - flag: "-n {count}"
        meaning: "Exit after this many iterations (useful in scripts)"
      - flag: "-b"
        meaning: "Batch mode — non-interactive output suitable for piping"
      - flag: "-d {seconds}"
        meaning: "Set the update delay interval in seconds"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "top is read-only; no undo required"
    distro_notes:
      macOS: "top on macOS uses different flags; -i sets interval, -o sets sort key"
    related_commands:
      - htop
      - ps
      - pgrep
      - watch

  - name: htop
    description: "Interactive process viewer — an enhanced, color version of top"
    common_intents:
      - intent: "interactively monitor all running processes"
        alternate_phrasings:
          - "htop"
          - "I want a nicer version of top with colors and mouse support"
          - "something is wrong with my machine, open the process monitor"
          - "open task manager"
          - "what is running"
        pattern: "htop"
        example: "htop"
      - intent: "monitor processes for a specific user"
        alternate_phrasings:
          - "htop filtered to {username}"
          - "only show my processes in htop"
          - "what is user alice running"
        pattern: "htop -u {username}"
        example: "htop -u alice"
      - intent: "show processes in a tree view"
        alternate_phrasings:
          - "htop tree mode"
          - "show parent child in htop"
          - "hierarchical process view"
        pattern: "htop -t"
        example: "htop -t"
      - intent: "sort processes by a specific metric"
        alternate_phrasings:
          - "sort htop by memory"
          - "show biggest CPU users first in htop"
          - "order by PERCENT_MEM in htop"
        pattern: "htop -s {sort_item}"
        example: "htop -s PERCENT_MEM"
      - intent: "run htop in read-only mode"
        alternate_phrasings:
          - "htop without ability to kill processes"
          - "safe view-only htop for shared terminal"
          - "htop readonly"
        pattern: "htop --readonly"
        example: "htop --readonly"
    key_flags:
      - flag: "-u {username}"
        meaning: "Show only processes owned by the given user"
      - flag: "-t"
        meaning: "Display processes in a tree hierarchy"
      - flag: "-s {sort_item}"
        meaning: "Sort by the named column at startup"
      - flag: "-d {delay}"
        meaning: "Delay between updates in tenths of a second (50 = 5s)"
      - flag: "--readonly"
        meaning: "Disable all system and process modification features"
      - flag: "-p {pid1},{pid2}"
        meaning: "Monitor only the specified PIDs"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "htop is read-only by default; no undo required"
    related_commands:
      - top
      - ps
      - pgrep

  - name: kill
    description: "Send a signal to a process by PID, defaulting to SIGTERM"
    common_intents:
      - intent: "terminate a process gracefully"
        alternate_phrasings:
          - "kill {pid}"
          - "stop that process nicely so it can clean up"
          - "end process {pid}"
          - "shut it down"
          - "hung process, try soft kill first"
        pattern: "kill {pid}"
        example: "kill 1234"
      - intent: "force kill a process that won't respond to SIGTERM"
        alternate_phrasings:
          - "kill -9 {pid}"
          - "this process won't respond and I need to stop it, the PID is {pid}"
          - "make it stop"
          - "it is not dying, force kill it"
          - "process is stuck and ignoring normal kill"
        pattern: "kill -9 {pid}"
        example: "kill -9 1234"
      - intent: "send SIGHUP to reload a daemon's configuration"
        alternate_phrasings:
          - "reload nginx config without restart"
          - "tell the daemon to re-read its config file"
          - "graceful config reload via signal"
          - "kill -HUP {pid}"
        pattern: "kill -HUP {pid}"
        example: "kill -HUP 1234"
      - intent: "pause a process temporarily"
        alternate_phrasings:
          - "freeze that process"
          - "suspend pid {pid} without killing it"
          - "stop it from running but keep it in memory"
          - "kill -STOP {pid}"
        pattern: "kill -STOP {pid}"
        example: "kill -STOP 1234"
        followup: "kill -CONT {pid}"
      - intent: "resume a paused process"
        alternate_phrasings:
          - "unfreeze the process"
          - "continue the suspended process"
          - "kill -CONT {pid}"
        pattern: "kill -CONT {pid}"
        example: "kill -CONT 1234"
      - intent: "terminate a background job by job number"
        alternate_phrasings:
          - "kill job 1"
          - "stop the first background job"
          - "end shell job %{job_number}"
        pattern: "kill %{job_number}"
        example: "kill %1"
      - intent: "list all available signal names"
        alternate_phrasings:
          - "what signals can I send"
          - "show all kill signal names and numbers"
          - "signal list"
        pattern: "kill -l"
        example: "kill -l"
    key_flags:
      - flag: "-9 / -KILL / -SIGKILL"
        meaning: "Forceful termination; cannot be caught or ignored by the process"
      - flag: "-15 / -TERM / -SIGTERM"
        meaning: "Graceful termination request (default signal)"
      - flag: "-1 / -HUP / -SIGHUP"
        meaning: "Hang-up; many daemons reload configuration instead of exiting"
      - flag: "-2 / -INT / -SIGINT"
        meaning: "Interrupt signal, equivalent to pressing Ctrl+C"
      - flag: "-19 / -STOP / -SIGSTOP"
        meaning: "Pause/suspend the process; cannot be caught"
      - flag: "-18 / -CONT / -SIGCONT"
        meaning: "Resume a stopped process"
      - flag: "-l"
        meaning: "List all signal names and numbers"
    safety:
      level: "dangerous"
      requires_sudo: false
      confirmation_required_for:
        - "kill -9 {pid}"
        - "kill -KILL {pid}"
        - "kill -9 -1 (kills all processes owned by invoking user)"
      blocked_patterns:
        - "kill -9 1"
        - "kill -KILL 1"
        - "kill -9 -1"
        - "kill 1"
    undo:
      "SIGSTOP": "kill -CONT {pid}"
      "SIGTERM / SIGKILL": "not undoable — process is terminated"
      "SIGHUP": "restart the daemon manually if it exited"
    related_commands:
      - killall
      - pkill
      - pgrep
      - ps

  - name: killall
    description: "Send a signal to all processes matching a given name (exact name match)"
    common_intents:
      - intent: "terminate all instances of a process by name"
        alternate_phrasings:
          - "killall firefox"
          - "close every instance of {process_name}"
          - "I have a bunch of zombie workers and want to kill them all by name"
          - "nuke all {process_name} processes"
          - "wipe out every running {process_name}"
        pattern: "killall {process_name}"
        example: "killall firefox"
      - intent: "force kill all instances of a process"
        alternate_phrasings:
          - "killall -KILL {process_name}"
          - "processes won't die gracefully, force kill all of them"
          - "hard kill every {process_name}"
          - "none of them are responding to SIGTERM"
        pattern: "killall -KILL {process_name}"
        example: "killall -KILL nginx"
      - intent: "ask for confirmation before killing each process"
        alternate_phrasings:
          - "killall with confirmation prompt"
          - "I want to review each process before killing it"
          - "interactive killall"
        pattern: "killall -i {process_name}"
        example: "killall -i python3"
      - intent: "send SIGHUP to reload all instances of a daemon"
        alternate_phrasings:
          - "reload all apache2 workers"
          - "tell every {process_name} to re-read its config"
          - "graceful reload via killall"
        pattern: "killall -HUP {process_name}"
        example: "killall -HUP apache2"
      - intent: "kill all processes owned by a specific user"
        alternate_phrasings:
          - "kill every process belonging to user {username}"
          - "wipe out all of alice's python processes"
          - "user-scoped killall"
        pattern: "killall -u {username} {process_name}"
        example: "killall -u alice python3"
    key_flags:
      - flag: "-i / --interactive"
        meaning: "Ask for confirmation before killing each process"
      - flag: "-u / --user {user}"
        meaning: "Restrict killing to processes owned by the specified user"
      - flag: "-e / --exact"
        meaning: "Require exact name match (important for long process names)"
      - flag: "-I / --ignore-case"
        meaning: "Case-insensitive process name match"
      - flag: "-g / --process-group"
        meaning: "Kill the process group to which the matching process belongs"
      - flag: "-w / --wait"
        meaning: "Wait until all killed processes have died"
      - flag: "-q / --quiet"
        meaning: "Do not complain if no processes were killed"
    safety:
      level: "dangerous"
      requires_sudo: false
      confirmation_required_for:
        - "killall -KILL {name}"
        - "killall {name} (when name matches critical system processes)"
      blocked_patterns:
        - "killall init"
        - "killall -9 init"
        - "killall -KILL init"
        - "killall systemd"
        - "killall -9 systemd"
        - "killall kernel"
    undo:
      "SIGTERM / SIGKILL": "not undoable — processes are terminated"
      "SIGHUP": "restart the daemon manually if it exited"
    distro_notes:
      macOS: "killall on macOS is a different implementation with different flags"
    related_commands:
      - kill
      - pkill
      - pgrep

  - name: pkill
    description: "Signal processes by name pattern (regex), more flexible than killall"
    common_intents:
      - intent: "kill all processes matching a name pattern"
        alternate_phrasings:
          - "pkill nginx"
          - "stop everything with {name} in the process name"
          - "kill all workers matching a regex"
          - "terminate matching processes"
          - "processes won't die, use pkill"
        pattern: "pkill \"{process_name}\""
        example: "pkill \"nginx\""
      - intent: "kill processes matching a string in the full command line"
        alternate_phrasings:
          - "pkill -f the full command"
          - "I want to kill a script by its full path or arguments, not just the binary name"
          - "kill by command line match"
          - "process running python myscript.py, kill it"
        pattern: "pkill -f \"{string}\""
        example: "pkill -f \"python myscript.py\""
      - intent: "force kill matching processes"
        alternate_phrasings:
          - "pkill -9 {process_name}"
          - "they are ignoring SIGTERM, force kill by pattern"
          - "hard kill by name"
          - "processes stuck, unblockable kill"
        pattern: "pkill -9 \"{process_name}\""
        example: "pkill -9 \"hung_process\""
      - intent: "kill processes owned by a specific user"
        alternate_phrasings:
          - "kill alice's python processes"
          - "user-scoped pkill"
          - "only kill matching processes belonging to {username}"
        pattern: "pkill -u {username} \"{process_name}\""
        example: "pkill -u alice \"python\""
      - intent: "kill only the oldest matching process"
        alternate_phrasings:
          - "kill the longest-running instance"
          - "terminate the original process, not the newest one"
          - "pkill oldest"
        pattern: "pkill -o \"{process_name}\""
        example: "pkill -o \"firefox\""
    key_flags:
      - flag: "-f / --full"
        meaning: "Match against the full command line, not just the process name"
      - flag: "-u / --euid {user}"
        meaning: "Match only processes owned by the given user"
      - flag: "-o / --oldest"
        meaning: "Match only the oldest (least recently started) process"
      - flag: "-n / --newest"
        meaning: "Match only the newest (most recently started) process"
      - flag: "-9"
        meaning: "Send SIGKILL (force kill, unblockable)"
      - flag: "-e / --echo"
        meaning: "Print name and PID of each process being killed"
      - flag: "-x / --exact"
        meaning: "Match the process name exactly"
    safety:
      level: "dangerous"
      requires_sudo: false
      confirmation_required_for:
        - "pkill -9 {pattern}"
        - "pkill -f {broad_pattern} (risk of over-matching)"
      blocked_patterns:
        - "pkill -9 init"
        - "pkill -9 systemd"
        - "pkill init"
        - "pkill systemd"
    undo:
      "SIGTERM / SIGKILL": "not undoable — processes are terminated"
    related_commands:
      - kill
      - killall
      - pgrep

  - name: nice
    description: "Launch a program with a custom scheduling priority (niceness)"
    common_intents:
      - intent: "run a CPU-intensive program with lower priority to avoid impacting other processes"
        alternate_phrasings:
          - "nice -n 10 {command}"
          - "I want to run a big compile job but not freeze up my desktop"
          - "run this in the background without killing system responsiveness"
          - "low priority run"
          - "this backup script is grinding the system, run it with lower priority"
        pattern: "nice -n {niceness_value} {command}"
        example: "nice -n 10 make -j4"
      - intent: "run a program with higher priority (requires sudo)"
        alternate_phrasings:
          - "sudo nice -n -10 {command}"
          - "give this realtime process more CPU than normal"
          - "boost priority of this job"
        pattern: "sudo nice -n -{niceness_value} {command}"
        example: "sudo nice -n -10 ./realtime_processor"
      - intent: "check the current niceness value of the shell"
        alternate_phrasings:
          - "what is my current nice level"
          - "show niceness of this shell"
        pattern: "nice"
        example: "nice"
    key_flags:
      - flag: "-n {N} / --adjustment={N}"
        meaning: "Add integer N to the niceness (default +10 if omitted). Negative requires root."
    safety:
      level: "moderate"
      requires_sudo: false
      confirmation_required_for:
        - "sudo nice -n -{high_value} {command} (raising priority above 0 requires root)"
      blocked_patterns: []
    undo:
      "launched with low priority": "renice -n 0 -p {pid}"
      "program started": "not undoable — must kill and restart with different niceness"
    related_commands:
      - renice
      - ps
      - top

  - name: renice
    description: "Alter the scheduling priority of one or more already-running processes"
    common_intents:
      - intent: "lower the priority of a running process"
        alternate_phrasings:
          - "renice {pid} to be less aggressive"
          - "that process is hogging CPU, deprioritize it without killing it"
          - "turn down the priority on pid {pid}"
          - "make this running process nicer to others"
          - "background job is stealing too much CPU"
        pattern: "renice -n {positive_value} -p {pid}"
        example: "renice -n 10 -p 1234"
      - intent: "raise the priority of a running process (requires sudo)"
        alternate_phrasings:
          - "sudo renice -n -5 -p {pid}"
          - "boost a running process to higher priority"
          - "give more CPU to pid {pid}"
        pattern: "sudo renice -n -{value} -p {pid}"
        example: "sudo renice -n -5 -p 1234"
      - intent: "change priority of all processes owned by a user"
        alternate_phrasings:
          - "renice everything belonging to {username}"
          - "deprioritize all of alice's processes at once"
        pattern: "renice -n {value} -u {username}"
        example: "renice -n 5 -u alice"
    key_flags:
      - flag: "-n {N}"
        meaning: "Relative or absolute priority adjustment (behavior depends on POSIXLY_CORRECT)"
      - flag: "--priority {N}"
        meaning: "Set absolute scheduling priority"
      - flag: "--relative {N}"
        meaning: "Increment or decrement priority by N"
      - flag: "-p / --pid"
        meaning: "Interpret arguments as process IDs (default)"
      - flag: "-u / --user"
        meaning: "Interpret arguments as usernames or UIDs"
      - flag: "-g / --pgrp"
        meaning: "Interpret arguments as process group IDs"
    safety:
      level: "moderate"
      requires_sudo: false
      confirmation_required_for:
        - "sudo renice -n -{value} -p {pid} (raising priority requires root)"
      blocked_patterns: []
    undo:
      "priority changed": "renice -n {original_value} -p {pid}"
    related_commands:
      - nice
      - ps
      - top

  - name: nohup
    description: "Run a command immune to hangup signals so it continues after the terminal closes"
    common_intents:
      - intent: "keep a process running after logging out"
        alternate_phrasings:
          - "nohup {command} &"
          - "I need to start a long job and then close my SSH session without killing it"
          - "run this script so it survives terminal disconnect"
          - "keep alive after logout"
          - "SSH session will drop, keep the process going"
        pattern: "nohup {command} &"
        example: "nohup python3 server.py &"
      - intent: "redirect nohup output to a specific file"
        alternate_phrasings:
          - "nohup with custom log file"
          - "I want to capture output from a nohup process to a specific path"
          - "save nohup output somewhere other than nohup.out"
        pattern: "nohup {command} > {path/to/output_file} 2>&1 &"
        example: "nohup ./long_job.sh > /var/log/job.log 2>&1 &"
      - intent: "run a long transfer or backup that must not be interrupted"
        alternate_phrasings:
          - "nohup rsync in background"
          - "start a backgrounded file copy that won't die if terminal closes"
          - "fire and forget rsync"
        pattern: "nohup {command} {arg1} {arg2} &"
        example: "nohup rsync -av /src/ /dst/ &"
    key_flags:
      - flag: "(none)"
        meaning: "nohup has no flags; append & to background the process immediately"
    safety:
      level: "moderate"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "process started with nohup": "kill {pid} (find PID with pgrep or ps; output defaults to nohup.out)"
    related_commands:
      - bg
      - fg
      - jobs
      - disown

  - name: bg
    description: "Resume a suspended job and run it in the background"
    common_intents:
      - intent: "resume the most recently suspended job in the background"
        alternate_phrasings:
          - "bg"
          - "I pressed Ctrl+Z and now I want it to keep running in the background"
          - "put that suspended job back to work without blocking my terminal"
          - "continue it in background"
          - "unstop the last job and run it in background"
        pattern: "bg"
        example: "bg"
      - intent: "resume a specific job in the background"
        alternate_phrasings:
          - "bg %2"
          - "background job number {job_number}"
          - "which job number was that? resume it in the background"
        pattern: "bg %{job_number}"
        example: "bg %2"
        followup: "jobs"
    key_flags:
      - flag: "%{job_number}"
        meaning: "Specify which job to background (omit for most recent)"
    safety:
      level: "moderate"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "sent to background": "fg %{job_number}"
    related_commands:
      - fg
      - jobs
      - nohup
      - disown

  - name: fg
    description: "Bring a background or suspended job to the foreground"
    common_intents:
      - intent: "bring the most recent background job to the foreground"
        alternate_phrasings:
          - "fg"
          - "bring back the last thing I backgrounded"
          - "get that job back in front of me"
          - "resume in foreground"
        pattern: "fg"
        example: "fg"
      - intent: "bring a specific background job to the foreground"
        alternate_phrasings:
          - "fg %1"
          - "I want to interact with job number {job_number} again"
          - "bring job {job_number} to front"
        pattern: "fg %{job_number}"
        example: "fg %1"
        followup: "jobs"
    key_flags:
      - flag: "%{job_number}"
        meaning: "Specify which job to foreground (omit for most recent)"
    safety:
      level: "moderate"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "brought to foreground": "Ctrl+Z to suspend, then bg %{job_number}"
    related_commands:
      - bg
      - jobs
      - nohup

  - name: jobs
    description: "List all jobs started by the current shell with their status"
    common_intents:
      - intent: "list all background and suspended jobs in the current shell"
        alternate_phrasings:
          - "jobs"
          - "what did I background in this terminal"
          - "show me everything I have suspended or running in the background"
          - "what jobs are active"
          - "list shell jobs"
        pattern: "jobs"
        example: "jobs"
      - intent: "list jobs with their PIDs"
        alternate_phrasings:
          - "jobs -l"
          - "show job numbers and PIDs together"
          - "I need the PID of that backgrounded job"
        pattern: "jobs -l"
        example: "jobs -l"
      - intent: "show only running jobs"
        alternate_phrasings:
          - "only show active background jobs"
          - "list running jobs not suspended ones"
        pattern: "jobs -r"
        example: "jobs -r"
      - intent: "show only stopped (suspended) jobs"
        alternate_phrasings:
          - "what did I Ctrl+Z"
          - "list suspended jobs only"
          - "show paused jobs"
        pattern: "jobs -s"
        example: "jobs -s"
    key_flags:
      - flag: "-l"
        meaning: "List jobs along with their PIDs"
      - flag: "-r"
        meaning: "Show only running jobs"
      - flag: "-s"
        meaning: "Show only stopped (suspended) jobs"
      - flag: "-n"
        meaning: "Show only jobs whose status has changed since last notification"
      - flag: "-p"
        meaning: "Show only process IDs"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "jobs is read-only; no undo required"
    related_commands:
      - bg
      - fg
      - ps
      - disown

  - name: wait
    description: "Wait for a process or job to complete and return its exit status"
    common_intents:
      - intent: "wait for a background process to finish"
        alternate_phrasings:
          - "wait {pid}"
          - "block until that pid completes"
          - "do not proceed until pid {pid} exits"
          - "script needs to wait for a subprocess before continuing"
        pattern: "wait {pid}"
        example: "wait 1234"
      - intent: "wait for all background jobs started by this shell to finish"
        alternate_phrasings:
          - "wait for everything"
          - "barrier — block until all background jobs complete"
          - "join all background tasks"
          - "let all parallel jobs finish before next step"
        pattern: "wait"
        example: "wait"
      - intent: "wait for a specific job by job number"
        alternate_phrasings:
          - "wait for job %1"
          - "block until shell job {job_number} finishes"
        pattern: "wait %{job_number}"
        example: "wait %1"
    key_flags:
      - flag: "{pid}"
        meaning: "Wait for the process with this PID"
      - flag: "%{job_number}"
        meaning: "Wait for the job with this job number"
      - flag: "(no args)"
        meaning: "Wait for all background processes known to the shell"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "wait only blocks; it does not modify process state"
    related_commands:
      - jobs
      - bg
      - fg
      - ps

  - name: pgrep
    description: "Search for processes by name or attributes and return their PIDs"
    common_intents:
      - intent: "find the PID of a running process by name"
        alternate_phrasings:
          - "pgrep nginx"
          - "what is the PID of {process_name}"
          - "I need the process ID but do not want to parse ps output"
          - "get pid for {process_name}"
          - "is {process_name} running and what is its pid"
        pattern: "pgrep {process_name}"
        example: "pgrep nginx"
      - intent: "search for processes matching a full command line"
        alternate_phrasings:
          - "pgrep -f {full_command_string}"
          - "find a process by its full command including arguments"
          - "I know the script path, find the pid"
          - "match by entire command not just process name"
        pattern: "pgrep -f \"{command_string}\""
        example: "pgrep -f \"python manage.py\""
      - intent: "find processes run by a specific user"
        alternate_phrasings:
          - "pgrep -u {username}"
          - "what is the PID of {process_name} running as {username}"
          - "user-filtered pgrep"
        pattern: "pgrep -u {username} {process_name}"
        example: "pgrep -u www-data nginx"
      - intent: "count how many instances of a process are running"
        alternate_phrasings:
          - "how many worker processes are running"
          - "how many instances of {process_name}"
          - "count running {process_name}"
        pattern: "pgrep -c {process_name}"
        example: "pgrep -c worker"
      - intent: "list PIDs and names of matching processes"
        alternate_phrasings:
          - "pgrep with process names in output"
          - "show me pid and name together"
          - "verbose pgrep"
        pattern: "pgrep -a {process_name}"
        example: "pgrep -a python"
    key_flags:
      - flag: "-f / --full"
        meaning: "Match against the full command line, not just the process name"
      - flag: "-u / --euid {user}"
        meaning: "Match only processes owned by the given user"
      - flag: "-c / --count"
        meaning: "Print a count of matching processes instead of PIDs"
      - flag: "-a"
        meaning: "List PID and full command line of matching processes"
      - flag: "-d / --delimiter {string}"
        meaning: "Use a custom delimiter between output PIDs (default: newline)"
      - flag: "-x"
        meaning: "Match the process name exactly"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "pgrep is read-only; no undo required"
    related_commands:
      - pkill
      - ps
      - kill
      - lsof

  - name: xargs
    description: "Build and execute commands from standard input, enabling piped argument passing"
    common_intents:
      - intent: "pass output of one command as arguments to another"
        alternate_phrasings:
          - "pipe results into another command"
          - "I have a list of things and I want to run a command on each of them"
          - "feed find output into rm"
          - "chain commands with piped arguments"
          - "take stdout of one command and use it as args for another"
        pattern: "{source_command} | xargs {command}"
        example: "find . -name '*.tmp' | xargs rm"
      - intent: "run a command once per input item"
        alternate_phrasings:
          - "xargs -n 1 to run per line"
          - "kill each pid one at a time from a list"
          - "invoke {command} separately for every line of input"
          - "one invocation per item"
        pattern: "{source_command} | xargs -n 1 {command}"
        example: "cat pids.txt | xargs -n 1 kill"
      - intent: "run commands in parallel"
        alternate_phrasings:
          - "xargs parallel execution"
          - "process multiple items at once with xargs"
          - "use 4 workers to process in parallel"
          - "speed up xargs with parallelism"
        pattern: "{source_command} | xargs -P {num_procs} -n 1 {command}"
        example: "find . -name '*.gz' | xargs -P 4 -n 1 gunzip"
      - intent: "use a placeholder to insert input at a specific position"
        alternate_phrasings:
          - "xargs -I to place input mid-command"
          - "I need the argument in the middle of the command not at the end"
          - "xargs with {} substitution"
          - "replace placeholder with each input item"
        pattern: "{source_command} | xargs -I {} {command} {}"
        example: "ls *.log | xargs -I {} cp {} /backup/{}"
      - intent: "handle filenames with spaces safely using null delimiter"
        alternate_phrasings:
          - "xargs -0 for filenames with spaces"
          - "files have spaces in names and xargs is breaking"
          - "safe xargs with find -print0"
          - "null-delimited input for xargs"
        pattern: "find . -name '*.pdf' -print0 | xargs -0 {command}"
        example: "find . -name '*.pdf' -print0 | xargs -0 rm"
      - intent: "do nothing if input is empty"
        alternate_phrasings:
          - "xargs --no-run-if-empty"
          - "only run the command if there is actually input"
          - "skip command when pipe returns nothing"
        pattern: "{source_command} | xargs --no-run-if-empty {command}"
        example: "find . -name '*.bak' | xargs --no-run-if-empty rm"
    key_flags:
      - flag: "-n {max-args}"
        meaning: "Use at most max-args arguments per command invocation"
      - flag: "-P {max-procs}"
        meaning: "Run up to max-procs processes simultaneously"
      - flag: "-I {replace-str}"
        meaning: "Replace occurrences of replace-str in the command with input"
      - flag: "-0 / --null"
        meaning: "Expect NUL-delimited input (safe for filenames with spaces)"
      - flag: "-p / --interactive"
        meaning: "Prompt user for confirmation before running each command"
      - flag: "-a {file} / --arg-file={file}"
        meaning: "Read arguments from a file instead of stdin"
      - flag: "--no-run-if-empty"
        meaning: "Do not run command if stdin is empty (GNU extension)"
    safety:
      level: "moderate"
      requires_sudo: false
      confirmation_required_for:
        - "xargs rm / xargs kill (destructive commands piped through xargs)"
      blocked_patterns:
        - "xargs rm -rf / (would wipe filesystem)"
        - "xargs kill -9 (mass force-kill without confirmation)"
    undo:
      "files deleted via xargs rm": "not recoverable without backup"
      "processes killed via xargs kill": "not undoable"
    related_commands:
      - find
      - pgrep
      - kill

  - name: watch
    description: "Execute a command repeatedly at a fixed interval and display the output full-screen"
    common_intents:
      - intent: "monitor the output of a command as it changes over time"
        alternate_phrasings:
          - "watch {command}"
          - "I want to keep an eye on disk usage and see it update every few seconds"
          - "live updating view of a command's output"
          - "repeat this command and show the result"
          - "keep running ps and refresh the display"
        pattern: "watch {command}"
        example: "watch df -h"
      - intent: "run a command every N seconds"
        alternate_phrasings:
          - "watch -n 5 {command}"
          - "check free memory every 5 seconds"
          - "poll this command on a custom interval"
          - "update every {seconds} seconds"
        pattern: "watch -n {seconds} {command}"
        example: "watch -n 5 free -m"
      - intent: "highlight differences between successive outputs"
        alternate_phrasings:
          - "watch -d to show changes"
          - "I want to see what changed between updates"
          - "highlight output diffs in watch"
          - "make changes stand out visually"
        pattern: "watch -d {command}"
        example: "watch -d netstat -an"
      - intent: "exit watch when output changes"
        alternate_phrasings:
          - "watch -g and stop when something changes"
          - "notify me when lsblk output changes"
          - "exit watch on change"
          - "wait until the command output is different then exit"
        pattern: "watch -g {command}"
        example: "watch -g lsblk"
      - intent: "monitor process list periodically"
        alternate_phrasings:
          - "watch ps every 2 seconds"
          - "I want a poor man's top using watch and ps"
          - "auto-refresh process list"
        pattern: "watch -n {seconds} ps aux"
        example: "watch -n 2 ps aux"
    key_flags:
      - flag: "-n {seconds} / --interval"
        meaning: "Set the update interval in seconds (default 2s, minimum 0.1s)"
      - flag: "-d / --differences"
        meaning: "Highlight lines that changed between updates"
      - flag: "-g / --chgexit"
        meaning: "Exit when the output of the command changes"
      - flag: "-c / --color"
        meaning: "Interpret ANSI color and style escape sequences"
      - flag: "-e / --errexit"
        meaning: "Freeze on command error and exit on keypress"
      - flag: "-t / --no-title"
        meaning: "Hide the header line showing interval and command"
      - flag: "-b / --beep"
        meaning: "Beep if the command exits with a non-zero status"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "watch is read-only; no undo required (unless the watched command mutates state)"
    related_commands:
      - top
      - ps
      - pgrep

  - name: timeout
    description: "Run a command with a time limit, sending a signal when the limit expires"
    common_intents:
      - intent: "run a command and kill it if it takes too long"
        alternate_phrasings:
          - "timeout 30s {command}"
          - "this command sometimes hangs forever, kill it after 30 seconds"
          - "set a deadline on a command"
          - "do not let this run for more than {duration}"
          - "script is stuck in CI, add a timeout"
        pattern: "timeout {duration} {command}"
        example: "timeout 30s curl https://example.com"
      - intent: "send a specific signal when timeout occurs"
        alternate_phrasings:
          - "timeout with custom signal"
          - "send SIGINT instead of SIGTERM on timeout"
          - "use interrupt signal when time expires"
        pattern: "timeout -s {SIGNAL} {duration} {command}"
        example: "timeout -s INT 10s ./interactive_script.sh"
      - intent: "force kill with SIGKILL if process ignores the initial signal"
        alternate_phrasings:
          - "timeout with kill-after fallback"
          - "process might ignore SIGTERM, also send SIGKILL after 5 more seconds"
          - "guarantee the process dies even if it traps signals"
          - "double-tap timeout"
        pattern: "timeout -k {kill_delay} {duration} {command}"
        example: "timeout -k 5s 30s ./app"
      - intent: "preserve the command's exit status even when it times out"
        alternate_phrasings:
          - "timeout --preserve-status"
          - "I need the real exit code from a timed-out command in a script"
          - "do not mask exit status with timeout's own code"
        pattern: "timeout --preserve-status {duration} {command}"
        example: "timeout --preserve-status 10s ./test_runner"
    key_flags:
      - flag: "-s {SIGNAL} / --signal={SIGNAL}"
        meaning: "Signal to send on timeout (default SIGTERM)"
      - flag: "-k {duration} / --kill-after={duration}"
        meaning: "Send SIGKILL this long after the initial signal if process is still alive"
      - flag: "--preserve-status"
        meaning: "Exit with the same status as COMMAND even when it times out"
      - flag: "--foreground"
        meaning: "Allow COMMAND to receive TTY signals (useful when not on a shell prompt)"
      - flag: "-v / --verbose"
        meaning: "Print a message to stderr indicating which signal was sent"
    safety:
      level: "moderate"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "process killed by timeout": "not undoable — restart the process manually"
    related_commands:
      - kill
      - watch
      - nohup

  - name: strace
    description: "Trace system calls and signals made by a process for debugging"
    common_intents:
      - intent: "trace all system calls made by a command"
        alternate_phrasings:
          - "strace {command}"
          - "I want to see every syscall this binary makes"
          - "debug what a program is doing under the hood"
          - "trace system calls of {command}"
          - "my program is failing silently, trace its syscalls to find out why"
        pattern: "strace {command}"
        example: "strace ls /tmp"
      - intent: "attach to a running process and trace its system calls"
        alternate_phrasings:
          - "strace -p {pid}"
          - "the process is already running and I want to attach strace to it"
          - "live-trace a running daemon"
          - "attach strace to pid {pid}"
        pattern: "sudo strace -p {pid}"
        example: "sudo strace -p 1234"
      - intent: "trace only file-related system calls"
        alternate_phrasings:
          - "strace -e trace=file"
          - "I only care about what files the process is opening"
          - "filter strace to file operations only"
          - "show open read write calls"
        pattern: "strace -e trace=file {command}"
        example: "strace -e trace=file python3 app.py"
      - intent: "trace only network system calls"
        alternate_phrasings:
          - "strace -e trace=network"
          - "what network connections is this process making"
          - "filter strace to socket and network calls"
        pattern: "strace -e trace=network {command}"
        example: "strace -e trace=network curl https://example.com"
      - intent: "follow child processes"
        alternate_phrasings:
          - "strace -f to follow forks"
          - "the program forks children, trace those too"
          - "trace across fork and exec"
        pattern: "strace -f {command}"
        example: "strace -f make"
      - intent: "summarize call counts and timing on exit"
        alternate_phrasings:
          - "strace -c for summary stats"
          - "I want a breakdown of how much time is spent in each syscall"
          - "profile syscall usage"
          - "count syscalls and show timing summary"
        pattern: "strace -c {command}"
        example: "strace -c ./slow_program"
      - intent: "save trace output to a file"
        alternate_phrasings:
          - "strace -o to log to file"
          - "the output is too long for the terminal, save it to a file"
          - "redirect strace output to a log"
        pattern: "strace -o {path/to/trace.txt} {command}"
        example: "strace -o /tmp/trace.txt ./app"
    key_flags:
      - flag: "-p {pid} / --attach={pid}"
        meaning: "Attach to an existing running process by PID"
      - flag: "-e trace={expr}"
        meaning: "Filter to a specific set of system calls or categories"
      - flag: "-f / --follow-forks"
        meaning: "Follow child processes as they are created by fork/vfork/clone"
      - flag: "-c / --summary-only"
        meaning: "Count calls, time, and errors per syscall and print a summary on exit"
      - flag: "-o {file} / --output={file}"
        meaning: "Write trace output to a file instead of stderr"
      - flag: "-T / --syscall-times"
        meaning: "Show the time spent in each system call"
      - flag: "-s {strsize} / --string-limit={strsize}"
        meaning: "Limit the size of strings printed (default 32)"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "strace is read-only tracing; no undo required"
    distro_notes:
      Linux: "strace is Linux-specific; macOS equivalent is dtruss or dtrace"
    related_commands:
      - lsof
      - ps
      - ltrace

  - name: lsof
    description: "List open files and the processes that have them open (files, sockets, pipes)"
    common_intents:
      - intent: "find which process has a specific file open"
        alternate_phrasings:
          - "lsof {path}"
          - "something is holding this file open and I cannot delete it"
          - "who has this file open"
          - "find process using file {path}"
          - "I cannot unmount because something is still using a file there"
        pattern: "lsof {path/to/file}"
        example: "lsof /var/log/syslog"
        followup: "kill {pid}"
      - intent: "find which process is using a specific network port"
        alternate_phrasings:
          - "lsof -i :{port}"
          - "what is running on port 8080"
          - "port 3000 is already in use, what is using it"
          - "find process listening on port {port}"
          - "address already in use, who owns that port"
        pattern: "lsof -i :{port}"
        example: "lsof -i :8080"
      - intent: "list all files opened by a user"
        alternate_phrasings:
          - "lsof -u {username}"
          - "what files does user alice have open"
          - "all open file descriptors for {username}"
        pattern: "lsof -u {username}"
        example: "lsof -u alice"
      - intent: "list all files opened by a specific process"
        alternate_phrasings:
          - "lsof -p {pid}"
          - "what files does pid {pid} have open"
          - "show all file descriptors for a process"
        pattern: "lsof -p {pid}"
        example: "lsof -p 1234"
      - intent: "find process listening on a TCP port"
        alternate_phrasings:
          - "lsof TCP listen on port {port}"
          - "who is listening on port 80"
          - "what web server is bound to port {port}"
        pattern: "lsof -i TCP:{port} -sTCP:LISTEN"
        example: "lsof -i TCP:80 -sTCP:LISTEN"
      - intent: "find processes blocking unmount of a filesystem"
        alternate_phrasings:
          - "device is busy when trying to unmount"
          - "something is still using the USB drive"
          - "target is busy umount"
          - "who is using the mounted filesystem"
        pattern: "lsof +f -- {mount_point}"
        example: "lsof +f -- /mnt/usb"
      - intent: "list all open files in a directory"
        alternate_phrasings:
          - "lsof +D {directory}"
          - "what processes have files open under this directory"
          - "find open files recursively in {directory}"
        pattern: "lsof +D {path/to/directory}"
        example: "lsof +D /var/log"
    key_flags:
      - flag: "-i [:{port}]"
        meaning: "List network files; optionally filter by port"
      - flag: "-u {username}"
        meaning: "List files opened by the specified user"
      - flag: "-p {pid}"
        meaning: "List files opened by the process with this PID"
      - flag: "-c {name}"
        meaning: "List files opened by processes whose name starts with name"
      - flag: "+D {directory}"
        meaning: "List all open files in the directory tree"
      - flag: "-t"
        meaning: "Output only PIDs (terse mode, useful in scripts)"
      - flag: "-n"
        meaning: "Do not resolve network addresses to hostnames (faster)"
      - flag: "-P"
        meaning: "Do not resolve port numbers to service names"
      - flag: "-sTCP:LISTEN"
        meaning: "Show only TCP sockets in LISTEN state"
    safety:
      level: "safe"
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "no state change": "lsof is read-only; no undo required"
    distro_notes:
      general: "Root privileges are required to list files opened by other users' processes"
    related_commands:
      - fuser
      - ps
      - netstat
      - ss
      - pgrep

  - name: fuser
    description: "Identify processes using specified files, directories, or network sockets"
    common_intents:
      - intent: "find which processes are accessing a file or directory"
        alternate_phrasings:
          - "fuser {path}"
          - "something is holding that directory open"
          - "who is using this file"
          - "find pids accessing {path}"
          - "cannot delete file because it is in use, find out who"
        pattern: "fuser {path/to/file_or_directory}"
        example: "fuser /var/log/app.log"
      - intent: "show detailed info about processes using a file"
        alternate_phrasings:
          - "fuser -v for verbose output"
          - "I want user, pid, access type and command for processes using this file"
          - "fuser with full details"
        pattern: "fuser -v {path/to/file_or_directory}"
        example: "fuser -v /tmp/data"
      - intent: "find which process is using a TCP port"
        alternate_phrasings:
          - "fuser {port}/tcp"
          - "what process owns port 8080"
          - "find who is listening on this port via fuser"
          - "port already in use, check with fuser"
        pattern: "fuser {port}/tcp"
        example: "fuser 8080/tcp"
      - intent: "kill all processes accessing a file"
        alternate_phrasings:
          - "fuser -k to kill users of a file"
          - "forcibly free up this locked file"
          - "kill everything holding this path open"
          - "the lock file is stuck, kill whoever has it"
        pattern: "fuser -k {path/to/file_or_directory}"
        example: "fuser -k /tmp/lockfile"
      - intent: "kill all processes using a TCP port"
        alternate_phrasings:
          - "fuser -k {port}/tcp"
          - "free up port {port} by killing whatever is using it"
          - "kill the process on port 8080"
          - "port is stuck occupied, kill it"
        pattern: "fuser -k {port}/tcp"
        example: "fuser -k 8080/tcp"
      - intent: "find processes accessing the filesystem that contains a file"
        alternate_phrasings:
          - "fuser -m for mount-level check"
          - "I need to unmount a USB drive but something is using it"
          - "show everything accessing the filesystem on this mount"
          - "device is busy before umount"
        pattern: "fuser -m {path/to/file_or_directory}"
        example: "fuser -m /mnt/usb"
        followup: "umount /mnt/usb"
    key_flags:
      - flag: "-v / --verbose"
        meaning: "Show USER, PID, ACCESS type, and COMMAND for each process"
      - flag: "-k / --kill"
        meaning: "Send SIGKILL to all processes accessing the named file or socket"
      - flag: "-m / --mount"
        meaning: "Show all processes accessing the filesystem containing the file"
      - flag: "-n {space}"
        meaning: "Select the namespace: file, udp, or tcp"
      - flag: "-i / --interactive"
        meaning: "Ask for confirmation before killing each process (use with -k)"
      - flag: "-s / --silent"
        meaning: "Suppress all output; rely on exit code only"
    safety:
      level: "dangerous"
      requires_sudo: false
      confirmation_required_for:
        - "fuser -k {file} (sends SIGKILL to all processes using the file)"
        - "fuser -k {port}/tcp (kills all processes using the port)"
      blocked_patterns:
        - "fuser -k /"
        - "fuser -k /usr"
        - "fuser -k /etc"
    undo:
      "fuser -k killed processes": "not undoable — processes must be restarted manually"
    related_commands:
      - lsof
      - kill
      - ps
      - umount
