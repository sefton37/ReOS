        - "nc -l.*-e.*bash"
        - "nc.*-e /bin/sh"
        - "nc.*-e /bin/bash"

    undo: {}

    distro_notes:
      all: "Different nc variants (OpenBSD netcat, GNU netcat, ncat from nmap) have slightly different flags. ncat (from nmap) is often preferred. The -e flag for shell execution is disabled in OpenBSD netcat for security reasons."

