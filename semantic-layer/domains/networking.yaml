      - intent: "transfer a file over the network"
        alternate_phrasings:
          - "nc {host} {port} < {file}"
          - "send {file} to {host}:{port} with netcat"
          - "quick file transfer to {host} without SCP"
        pattern: "nc {host} {port} < {path/to/file}"
