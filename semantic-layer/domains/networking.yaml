      - flag: "-v"
        meaning: "Verbose — report connection success/failure"
      - flag: "-l"
        meaning: "Listen mode"
      - flag: "-p"
        meaning: "Local port number"
      - flag: "-w"
        meaning: "Timeout in seconds"
      - flag: "-u"
        meaning: "UDP mode (default is TCP)"
      - flag: "-e"
        meaning: "Execute program on connect (dangerous — often disabled)"

    safety:
