domain: networking
description: "Network configuration, diagnostics, traffic analysis, and firewall management"
related_domains:
  - ssh-remote
  - permissions-security
  - system-info

commands:

  - name: ip
    description: "Show and manipulate routing, network devices, interfaces, and tunnels (modern replacement for ifconfig/route)"
    common_intents:
      - intent: "list all network interfaces with IP addresses"
        alternate_phrasings:
          - "ip addr"
          - "I need to see every network interface on this machine along with all assigned IP addresses"
          - "nothing is connecting, what interfaces do I even have"
          - "what's my IP"
          - "show me all my network adapters"
        pattern: "ip addr"
        example: "ip addr"
        followup: "ip -br addr"

      - intent: "show network interfaces in brief one-line format"
        alternate_phrasings:
          - "ip -br addr"
          - "quick overview of interfaces and IPs"
          - "just the interface names and addresses, nothing fancy"
        pattern: "ip -br addr"
        example: "ip -br addr"

      - intent: "show the routing table"
        alternate_phrasings:
          - "ip route"
          - "I want to verify which gateway packets are being sent through for a given destination"
          - "traffic isn't routing right, what does the route table look like"
          - "show routes"
          - "how does my machine decide where to send packets"
        pattern: "ip route"
        example: "ip route"

      - intent: "show which route would be used to reach a specific host"
        alternate_phrasings:
          - "ip route get {destination}"
          - "which interface and gateway would be used to reach {destination}"
          - "trace route selection for {destination}"
        pattern: "ip route get {destination}"
        example: "ip route get 8.8.8.8"

      - intent: "add a default gateway"
        alternate_phrasings:
          - "sudo ip route add default via {gateway}"
          - "machine has no internet, need to set a default route through {gateway}"
          - "set default gw to {gateway}"
        pattern: "sudo ip route add default via {gateway} dev {interface}"
        example: "sudo ip route add default via 192.168.1.1 dev eth0"
        followup: "ip route"

      - intent: "add an IP address to an interface"
        alternate_phrasings:
          - "sudo ip addr add {ip}/{prefix} dev {interface}"
          - "assign {ip} to {interface}"
        pattern: "sudo ip addr add {ip_address}/{prefix_len} dev {interface}"
        example: "sudo ip addr add 192.168.1.100/24 dev eth0"
        followup: "ip addr show {interface}"

      - intent: "remove an IP address from an interface"
        alternate_phrasings:
          - "sudo ip addr del {ip}/{prefix} dev {interface}"
          - "un-assign {ip} from {interface}"
        pattern: "sudo ip addr del {ip_address}/{prefix_len} dev {interface}"
        example: "sudo ip addr del 192.168.1.100/24 dev eth0"

      - intent: "bring a network interface up"
        alternate_phrasings:
          - "sudo ip link set {interface} up"
          - "interface {interface} is down, I need to enable it"
          - "turn on {interface}"
        pattern: "sudo ip link set {interface} up"
        example: "sudo ip link set eth0 up"
        followup: "ip link show {interface}"

      - intent: "bring a network interface down"
        alternate_phrasings:
          - "sudo ip link set {interface} down"
          - "disable interface {interface}"
          - "take down {interface}"
        pattern: "sudo ip link set {interface} down"
        example: "sudo ip link set eth0 down"

      - intent: "show ARP neighbor table"
        alternate_phrasings:
          - "ip neigh"
          - "show known MAC addresses on the local network"
          - "what hosts has this machine recently talked to at layer 2"
        pattern: "ip neighbour show"
        example: "ip neighbour show"

      - intent: "flush all IP addresses from an interface"
        alternate_phrasings:
          - "ip addr flush dev {interface}"
          - "clear all addresses off {interface}"
        pattern: "sudo ip addr flush dev {interface}"
        example: "sudo ip addr flush dev eth0"

      - intent: "change the MAC address of an interface"
        alternate_phrasings:
          - "sudo ip link set dev {interface} address {mac}"
          - "spoof the MAC on {interface} to {mac}"
        pattern: "sudo ip link set dev {interface} address {mac_address}"
        example: "sudo ip link set dev eth0 address aa:bb:cc:dd:ee:ff"

    key_flags:
      - flag: "addr"
        meaning: "Manage IP addresses (show/add/delete)"
      - flag: "link"
        meaning: "Manage network interfaces (up/down/show)"
      - flag: "route"
        meaning: "Manage routing table"
      - flag: "neigh"
        meaning: "Manage ARP/NDP neighbor cache"
      - flag: "-br"
        meaning: "Brief one-line output format"
      - flag: "-6"
        meaning: "Show IPv6 information"
      - flag: "-s"
        meaning: "Show statistics"
      - flag: "-c"
        meaning: "Colorize output"

    safety:
      level: moderate
      requires_sudo: true
      confirmation_required_for:
        - "ip link set {interface} down"
        - "ip addr flush dev {interface}"
        - "ip route flush"
      blocked_patterns: []

    undo:
      "ip addr add {ip}/{prefix} dev {iface}": "sudo ip addr del {ip}/{prefix} dev {iface}"
      "ip link set {iface} down": "sudo ip link set {iface} up"
      "ip route add {network} via {gw}": "sudo ip route del {network} via {gw}"

    distro_notes:
      all: "Part of iproute2 package; available on all modern Linux distros"

    related_commands:
      - ifconfig
      - route
      - nmcli
      - ethtool

  - name: ss
    description: "Investigate sockets — list open ports, connections, and listening services (modern replacement for netstat)"
    common_intents:
      - intent: "list all listening TCP ports with process names"
        alternate_phrasings:
          - "ss -tlp"
          - "I want to see every TCP port currently open on this machine and which process owns it"
          - "what's listening on this box"
          - "show open ports"
          - "port {port} in use, what's got it"
        pattern: "ss -tlnp"
        example: "ss -tlnp"

      - intent: "find what process is using a specific port"
        alternate_phrasings:
          - "what's on port {port}"
          - "I'm trying to start my app but something else is already bound to port {port}"
          - "who's hogging port {port}"
          - "show listener on {port}"
          - "port {port} conflict, who's there"
        pattern: "ss -tlnp src :{port}"
        example: "ss -tlnp src :8080"

      - intent: "show all established TCP connections"
        alternate_phrasings:
          - "ss -t state established"
          - "list active connections"
          - "what remote hosts is this machine connected to right now"
        pattern: "ss -tn state established"
        example: "ss -tn state established"

      - intent: "show all UDP listeners"
        alternate_phrasings:
          - "ss -ulnp"
          - "what UDP ports are open"
          - "list listening UDP services"
        pattern: "ss -ulnp"
        example: "ss -ulnp"

      - intent: "show all connections to a remote host and port"
        alternate_phrasings:
          - "ss -t dst {host}:{port}"
          - "show traffic going to {host} on port {port}"
        pattern: "ss -t dst {host}:{port}"
        example: "ss -t dst 192.168.2.1:80"

      - intent: "show all SSH connections"
        alternate_phrasings:
          - "ss -t state established '( dport = :ssh or sport = :ssh )'"
          - "who is SSH'd into this machine"
          - "list active SSH sessions"
        pattern: "ss -t state established '( dport = :ssh or sport = :ssh )'"
        example: "ss -t state established '( dport = :ssh or sport = :ssh )'"

    key_flags:
      - flag: "-t"
        meaning: "TCP sockets only"
      - flag: "-u"
        meaning: "UDP sockets only"
      - flag: "-l"
        meaning: "Listening sockets only"
      - flag: "-n"
        meaning: "Numeric addresses (no DNS resolution)"
      - flag: "-p"
        meaning: "Show process using the socket"
      - flag: "-a"
        meaning: "All sockets (listening and connected)"
      - flag: "-4 / -6"
        meaning: "IPv4 or IPv6 only"
      - flag: "-K"
        meaning: "Kill (forcibly close) matching socket connections"

    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []

    undo: {}

    distro_notes:
      all: "Part of iproute2; replaces netstat. Use sudo for -p flag to see processes owned by other users."

    related_commands:
      - netstat
      - lsof
      - ip

  - name: curl
    description: "Transfer data to or from a server over HTTP, HTTPS, FTP, and many other protocols"
    common_intents:
      - intent: "fetch the contents of a URL"
        alternate_phrasings:
          - "curl {url}"
          - "I need to make an HTTP GET request to {url} and see what the server returns"
          - "the site won't load in my browser, let me try from the command line"
          - "hit {url} and show me the response"
          - "is {url} returning anything"
        pattern: "curl {url}"
        example: "curl https://example.com"

      - intent: "check the HTTP status code of a URL without downloading the body"
        alternate_phrasings:
          - "curl -o /dev/null -w '%{http_code}' -s {url}"
          - "is {url} returning a 200 or is it broken"
          - "just give me the status code for {url}"
          - "website health check for {url}"
        pattern: "curl -o /dev/null -w '%{http_code}\\n' -s {url}"
        example: "curl -o /dev/null -w '%{http_code}\\n' -s https://example.com"

      - intent: "show response headers only"
        alternate_phrasings:
          - "curl -I {url}"
          - "I want to see what headers the server at {url} is sending back"
          - "check headers for {url}"
          - "what is {url} returning in its response headers"
        pattern: "curl -I {url}"
        example: "curl -I https://example.com"

      - intent: "download a file saving it with the remote filename"
        alternate_phrasings:
          - "curl -O {url}"
          - "download {url} to disk"
          - "grab the file at {url}"
        pattern: "curl -O {url}"
        example: "curl -O https://example.com/archive.tar.gz"

      - intent: "send a POST request with JSON data"
        alternate_phrasings:
          - "curl -X POST -d '{json}' {url}"
          - "I need to POST a JSON payload to {url}"
          - "submit JSON to the API at {url}"
        pattern: "curl -X POST -H 'Content-Type: application/json' -d '{json_data}' {url}"
        example: "curl -X POST -H 'Content-Type: application/json' -d '{\"name\":\"alice\"}' https://api.example.com/users"

      - intent: "send a request with a custom Authorization header"
        alternate_phrasings:
          - "curl -H 'Authorization: Bearer {token}' {url}"
          - "authenticated API call to {url} with bearer token"
          - "call {url} with auth header"
        pattern: "curl -H 'Authorization: Bearer {token}' {url}"
        example: "curl -H 'Authorization: Bearer mytoken123' https://api.example.com/data"

      - intent: "follow redirects and dump headers plus body"
        alternate_phrasings:
          - "curl -L -D - {url}"
          - "follow all redirects for {url} and show me what happens"
        pattern: "curl -L -D - {url}"
        example: "curl -L -D - https://example.com"

      - intent: "check your public external IP address"
        alternate_phrasings:
          - "curl ifconfig.me"
          - "what's my public IP"
          - "my ip?"
          - "what IP does the internet see me as"
        pattern: "curl ifconfig.me"
        example: "curl ifconfig.me"

      - intent: "test if a port is open on a remote host using curl"
        alternate_phrasings:
          - "curl -v telnet://{host}:{port}"
          - "I need to check whether {host} is accepting connections on port {port}"
          - "can I reach {host}:{port}"
        pattern: "curl -v --connect-timeout 5 telnet://{host}:{port}"
        example: "curl -v --connect-timeout 5 telnet://192.168.1.10:443"

    key_flags:
      - flag: "-X"
        meaning: "HTTP method (GET, POST, PUT, DELETE, etc.)"
      - flag: "-d"
        meaning: "Request body / POST data"
      - flag: "-H"
        meaning: "Add a request header"
      - flag: "-I"
        meaning: "Fetch headers only (HEAD request)"
      - flag: "-L"
        meaning: "Follow redirects"
      - flag: "-O"
        meaning: "Save output using remote filename"
      - flag: "-o"
        meaning: "Save output to specified file"
      - flag: "-s"
        meaning: "Silent mode (no progress meter)"
      - flag: "-v"
        meaning: "Verbose — show full request and response"
      - flag: "-k"
        meaning: "Skip TLS certificate verification"
      - flag: "--connect-timeout"
        meaning: "Seconds before giving up on connection"

    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for:
        - "POST/PUT/DELETE requests to production URLs"
      blocked_patterns: []

    undo: {}

    distro_notes:
      all: "Available on virtually all Linux distros. Prefer curl over wget for API work."

    related_commands:
      - wget
      - nc
      - http

  - name: wget
    description: "Download files from the web; supports recursive downloading and resuming partial downloads"
    common_intents:
      - intent: "download a file from a URL"
        alternate_phrasings:
          - "wget {url}"
          - "grab {url} and save it locally"
          - "download this file: {url}"
        pattern: "wget {url}"
        example: "wget https://example.com/archive.tar.gz"

      - intent: "download and save with a different filename"
        alternate_phrasings:
          - "wget -O {filename} {url}"
          - "download {url} but name it {filename}"
        pattern: "wget -O {filename} {url}"
        example: "wget -O myfile.zip https://example.com/release.zip"

      - intent: "resume a partially downloaded file"
        alternate_phrasings:
          - "wget -c {url}"
          - "the download got interrupted, pick up where it left off"
          - "continue incomplete download of {url}"
        pattern: "wget -c {url}"
        example: "wget -c https://example.com/bigfile.iso"

      - intent: "mirror an entire website locally"
        alternate_phrasings:
          - "wget -mk {url}"
          - "I need to download a whole site for offline use"
          - "recursive download of {url}"
        pattern: "wget --mirror --convert-links {url}"
        example: "wget --mirror --convert-links https://docs.example.com"

      - intent: "download all URLs listed in a text file"
        alternate_phrasings:
          - "wget -i {file}"
          - "batch download from a list of URLs in {file}"
        pattern: "wget -i {path/to/url_list.txt}"
        example: "wget -i downloads.txt"

      - intent: "limit download speed"
        alternate_phrasings:
          - "wget --limit-rate={rate} {url}"
          - "download {url} without saturating the link"
        pattern: "wget --limit-rate={rate} {url}"
        example: "wget --limit-rate=500k https://example.com/file.iso"

    key_flags:
      - flag: "-O"
        meaning: "Output filename"
      - flag: "-c"
        meaning: "Continue/resume partial download"
      - flag: "-i"
        meaning: "Read URLs from a file"
      - flag: "-r"
        meaning: "Recursive download"
      - flag: "-m"
        meaning: "Mirror (implies -r -N -l inf)"
      - flag: "-p"
        meaning: "Download all page requisites (images, CSS, etc.)"
      - flag: "-k"
        meaning: "Convert links for offline browsing"
      - flag: "--limit-rate"
        meaning: "Throttle download bandwidth"
      - flag: "-q"
        meaning: "Quiet mode"
      - flag: "--user / --password"
        meaning: "HTTP or FTP authentication credentials"

    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []

    undo: {}

    distro_notes:
      all: "Pre-installed on most distros. For API work prefer curl; wget excels at file downloads and mirroring."

    related_commands:
      - curl

  - name: ping
    description: "Send ICMP echo requests to test reachability of a network host"
    common_intents:
      - intent: "check if a host is reachable"
        alternate_phrasings:
          - "ping {host}"
          - "I need to verify network connectivity between this machine and the remote server at {host}"
          - "is {host} even up right now"
          - "can I reach {host}"
          - "connection to {host} seems down, let me check"
        pattern: "ping {host}"
        example: "ping google.com"

      - intent: "send a fixed number of pings then stop"
        alternate_phrasings:
          - "ping -c {count} {host}"
          - "ping {host} exactly {count} times"
          - "quick connectivity check to {host}"
        pattern: "ping -c {count} {host}"
        example: "ping -c 4 8.8.8.8"

      - intent: "ping with timeout to avoid hanging"
        alternate_phrasings:
          - "ping -c {count} -W {seconds} {host}"
          - "ping {host} but give up if no response in {seconds} seconds"
        pattern: "ping -c {count} -W {timeout} {host}"
        example: "ping -c 3 -W 2 192.168.1.1"

      - intent: "ping with numeric output only (no DNS lookup)"
        alternate_phrasings:
          - "ping -n {host}"
          - "ping without resolving hostnames"
        pattern: "ping -n {host}"
        example: "ping -n 8.8.8.8"

    key_flags:
      - flag: "-c"
        meaning: "Number of packets to send then stop"
      - flag: "-i"
        meaning: "Interval between packets in seconds (default 1)"
      - flag: "-W"
        meaning: "Per-packet response timeout in seconds"
      - flag: "-w"
        meaning: "Overall deadline in seconds for the entire run"
      - flag: "-n"
        meaning: "Numeric output only, no reverse DNS"
      - flag: "-O"
        meaning: "Report missing replies (no-response events)"

    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []

    undo: {}

    distro_notes:
      all: "Use -c to prevent infinite loops in scripts. mtr is a better real-time alternative."

    related_commands:
      - traceroute
      - mtr
      - nmap

  - name: dig
    description: "DNS lookup utility — query DNS records for a domain"
    common_intents:
      - intent: "look up the IP address for a domain"
        alternate_phrasings:
          - "dig {domain}"
          - "what IP does {domain} resolve to"
          - "DNS isn't resolving {domain}, what does dig say"
          - "resolve {domain}"
          - "what's the A record for {domain}"
        pattern: "dig +short {domain}"
        example: "dig +short example.com"

      - intent: "get a specific DNS record type for a domain"
        alternate_phrasings:
          - "dig {domain} {type}"
          - "look up the MX records for {domain}"
          - "what are the nameservers for {domain}"
          - "check TXT records on {domain}"
        pattern: "dig +short {domain} {A|MX|TXT|CNAME|NS|AAAA}"
        example: "dig +short example.com MX"

      - intent: "query a specific DNS server"
        alternate_phrasings:
          - "dig @{nameserver} {domain}"
          - "force DNS query through {nameserver} instead of system resolver"
          - "check {domain} against {nameserver} directly"
        pattern: "dig @{nameserver} {domain}"
        example: "dig @8.8.8.8 example.com"

      - intent: "reverse DNS lookup — find hostname for an IP"
        alternate_phrasings:
          - "dig -x {ip}"
          - "what hostname resolves to {ip}"
          - "PTR lookup for {ip}"
          - "who owns {ip}"
        pattern: "dig -x {ip_address}"
        example: "dig -x 8.8.8.8"

      - intent: "trace the full DNS resolution path"
        alternate_phrasings:
          - "dig +trace {domain}"
          - "DNS resolution is failing for {domain}, trace every hop"
          - "show me the full iterative DNS path for {domain}"
        pattern: "dig +trace {domain}"
        example: "dig +trace example.com"

      - intent: "find authoritative nameservers for a domain"
        alternate_phrasings:
          - "dig +nssearch {domain}"
          - "which nameservers are authoritative for {domain}"
          - "who is the authority for {domain}"
        pattern: "dig +nssearch {domain}"
        example: "dig +nssearch example.com"

    key_flags:
      - flag: "+short"
        meaning: "Terse output — just the answer"
      - flag: "+noall +answer"
        meaning: "Show only the answer section"
      - flag: "@{server}"
        meaning: "Query a specific DNS server"
      - flag: "-x"
        meaning: "Reverse DNS lookup (PTR)"
      - flag: "+trace"
        meaning: "Iterative trace from root servers"
      - flag: "+nssearch"
        meaning: "Find and display SOA records"
      - flag: "+tls"
        meaning: "Use DNS over TLS"
      - flag: "-p"
        meaning: "Use a non-standard port"

    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []

    undo: {}

    distro_notes:
      debian_ubuntu: "Part of bind9-dnsutils package"
      rhel_fedora: "Part of bind-utils package"

    related_commands:
      - nslookup
      - host
      - resolvectl

  - name: nslookup
    description: "Query DNS name servers for domain records (simpler interface than dig)"
    common_intents:
      - intent: "look up the IP for a domain using the default resolver"
        alternate_phrasings:
          - "nslookup {domain}"
          - "quick DNS check on {domain}"
          - "what does {domain} resolve to"
        pattern: "nslookup {domain}"
        example: "nslookup example.com"

      - intent: "query a specific DNS record type"
        alternate_phrasings:
          - "nslookup -type={type} {domain}"
          - "get the MX records for {domain}"
          - "look up NS records for {domain}"
        pattern: "nslookup -type={A|MX|TXT|NS|CNAME|PTR} {domain}"
        example: "nslookup -type=MX example.com"

      - intent: "query a specific nameserver for a domain"
        alternate_phrasings:
          - "nslookup {domain} {nameserver}"
          - "ask {nameserver} directly what {domain} resolves to"
        pattern: "nslookup {domain} {nameserver}"
        example: "nslookup example.com 8.8.8.8"

      - intent: "reverse lookup — find hostname for an IP"
        alternate_phrasings:
          - "nslookup {ip}"
          - "reverse lookup for {ip}"
          - "PTR record for {ip}"
        pattern: "nslookup -type=PTR {ip_address}"
        example: "nslookup -type=PTR 8.8.8.8"

    key_flags:
      - flag: "-type="
        meaning: "DNS record type to query (A, MX, TXT, NS, CNAME, PTR, AAAA)"
      - flag: "-debug"
        meaning: "Show full transaction details"
      - flag: "-vc"
        meaning: "Force TCP instead of UDP"
      - flag: "-port="
        meaning: "Use non-standard port"

    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []

    undo: {}

    distro_notes:
      all: "Simpler than dig for quick queries. For scripting, prefer dig."

    related_commands:
      - dig
      - host
      - resolvectl

  - name: traceroute
    description: "Print the network path (hops) packets take to reach a destination host"
    common_intents:
      - intent: "trace the network path to a host"
        alternate_phrasings:
          - "traceroute {host}"
          - "I need to see where packets are dropping between here and {host}"
          - "network is slow to {host}, find the bad hop"
          - "show hops to {host}"
          - "route to {host} seems wrong, trace it"
        pattern: "traceroute {host}"
        example: "traceroute google.com"

      - intent: "traceroute using numeric IPs only (no hostname lookup)"
        alternate_phrasings:
          - "traceroute -n {host}"
          - "traceroute without reverse DNS — it's too slow"
          - "fast traceroute to {host}"
        pattern: "traceroute -n {host}"
        example: "traceroute -n 8.8.8.8"

      - intent: "traceroute using ICMP instead of UDP"
        alternate_phrasings:
          - "traceroute -I {host}"
          - "UDP traceroute is getting filtered, try ICMP to {host}"
          - "ICMP-based traceroute to {host}"
        pattern: "traceroute -I {host}"
        example: "traceroute -I example.com"

      - intent: "determine the MTU path to a destination"
        alternate_phrasings:
          - "traceroute --mtu {host}"
          - "find the maximum packet size along the path to {host}"
          - "MTU discovery to {host}"
        pattern: "traceroute --mtu {host}"
        example: "traceroute --mtu example.com"

    key_flags:
      - flag: "-n"
        meaning: "Numeric IPs only — skip reverse DNS"
      - flag: "-I"
        meaning: "Use ICMP echo instead of UDP"
      - flag: "-T"
        meaning: "Use TCP SYN probes"
      - flag: "-w"
        meaning: "Timeout per probe in seconds"
      - flag: "-q"
        meaning: "Number of probes per hop (default 3)"
      - flag: "--mtu"
        meaning: "Discover path MTU"

    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []

    undo: {}

    distro_notes:
      all: "mtr combines ping and traceroute for real-time monitoring."

    related_commands:
      - mtr
      - ping
      - dig

  - name: nmap
    description: "Network exploration tool and port scanner — discover hosts and open services"
    common_intents:
      - intent: "scan the top 1000 ports on a host"
        alternate_phrasings:
          - "nmap {host}"
          - "what ports are open on {host}"
          - "do a port scan on {host}"
          - "I need a quick security audit of {host}"
          - "check what services are running on {host}"
        pattern: "nmap {host}"
        example: "nmap 192.168.1.1"

      - intent: "scan specific ports on a host"
        alternate_phrasings:
          - "nmap -p {ports} {host}"
          - "only scan ports {ports} on {host}"
          - "is port {ports} open on {host}"
        pattern: "nmap -p {port1,port2,...} {host}"
        example: "nmap -p 22,80,443 192.168.1.1"

      - intent: "scan all 65535 ports"
        alternate_phrasings:
          - "nmap -p- {host}"
          - "full port scan of {host}"
          - "scan every single port on {host}"
        pattern: "nmap -p- {host}"
        example: "nmap -p- 192.168.1.1"

      - intent: "host discovery sweep across a subnet"
        alternate_phrasings:
          - "nmap -sn {subnet}"
          - "what hosts are alive on the {subnet} network"
          - "ping sweep the {subnet} range"
          - "find all devices on {subnet}"
        pattern: "nmap -sn {subnet}"
        example: "nmap -sn 192.168.1.0/24"

      - intent: "detect service versions and OS on open ports"
        alternate_phrasings:
          - "nmap -sV -O {host}"
          - "what software version is running on each open port of {host}"
          - "aggressive fingerprinting scan of {host}"
          - "full recon on {host}"
        pattern: "sudo nmap -sC -sV -O {host}"
        example: "sudo nmap -sC -sV -O 192.168.1.1"

      - intent: "run nmap and save output to a file"
        alternate_phrasings:
          - "nmap -oA {output} {host}"
          - "scan {host} and save results to {output}"
        pattern: "nmap -sC -sV -oA {output_basename} {host}"
        example: "nmap -sC -sV -oA scan-results 192.168.1.1"

    key_flags:
      - flag: "-sn"
        meaning: "Host discovery only — no port scan (ping sweep)"
      - flag: "-sS"
        meaning: "SYN scan (requires root, stealthier)"
      - flag: "-sV"
        meaning: "Service version detection"
      - flag: "-sC"
        meaning: "Default NSE script scan"
      - flag: "-O"
        meaning: "OS detection (requires root)"
      - flag: "-A"
        meaning: "Aggressive: OS, version, scripts, traceroute"
      - flag: "-p"
        meaning: "Port range to scan (-p- for all)"
      - flag: "-T0..T5"
        meaning: "Timing template (0=slowest/stealth, 5=fastest)"
      - flag: "-oA"
        meaning: "Save output in all formats (normal, XML, grepable)"
      - flag: "--script"
        meaning: "Run NSE scripts (e.g. --script 'default and safe')"

    safety:
      level: moderate
      requires_sudo: true
      confirmation_required_for:
        - "scanning hosts you do not own"
        - "-A aggressive scan"
        - "SYN scan (-sS)"
      blocked_patterns:
        - "nmap --script exploit"
        - "nmap --script brute"
        - "nmap --script dos"

    undo: {}

    distro_notes:
      all: "Unauthorized scanning is illegal. Only scan networks and hosts you have explicit permission to scan."

    related_commands:
      - ss
      - netstat
      - traceroute

  - name: iptables
    description: "Configure the Linux kernel IPv4 packet filter — firewall rules, NAT, and traffic shaping"
    common_intents:
      - intent: "list all current firewall rules with line numbers"
        alternate_phrasings:
          - "sudo iptables -vnL --line-numbers"
          - "show me every firewall rule on this machine"
          - "the firewall is blocking something, show me all the rules"
          - "dump iptables rules"
          - "what's in the INPUT chain"
        pattern: "sudo iptables -vnL --line-numbers"
        example: "sudo iptables -vnL --line-numbers"

      - intent: "block incoming traffic from an IP address"
        alternate_phrasings:
          - "sudo iptables -A INPUT -s {ip} -j DROP"
          - "drop all packets from {ip}"
          - "firewall off {ip}"
          - "ban {ip} at the firewall level"
        pattern: "sudo iptables -A INPUT -s {ip_address} -j DROP"
        example: "sudo iptables -A INPUT -s 203.0.113.42 -j DROP"
        followup: "sudo iptables -vnL --line-numbers"

      - intent: "allow incoming traffic on a specific port"
        alternate_phrasings:
          - "sudo iptables -A INPUT -p tcp --dport {port} -j ACCEPT"
          - "open port {port} in the firewall"
          - "allow TCP connections to port {port}"
          - "firewall is blocking port {port}, fix it"
        pattern: "sudo iptables -A INPUT -p {tcp|udp} --dport {port} -j ACCEPT"
        example: "sudo iptables -A INPUT -p tcp --dport 443 -j ACCEPT"

      - intent: "delete a firewall rule by line number"
        alternate_phrasings:
          - "sudo iptables -D INPUT {line}"
          - "remove rule {line} from the INPUT chain"
          - "undo that iptables rule I just added"
        pattern: "sudo iptables -D {chain} {rule_line_number}"
        example: "sudo iptables -D INPUT 3"

      - intent: "add a NAT masquerade rule for a subnet"
        alternate_phrasings:
          - "sudo iptables -t nat -A POSTROUTING -s {subnet} -j MASQUERADE"
          - "set up NAT for the {subnet} network"
          - "configure IP masquerading"
        pattern: "sudo iptables -t nat -A POSTROUTING -s {subnet} -j MASQUERADE"
        example: "sudo iptables -t nat -A POSTROUTING -s 192.168.0.0/24 -j MASQUERADE"

      - intent: "save current iptables rules to persist across reboots"
        alternate_phrasings:
          - "iptables-save > /etc/iptables/rules.v4"
          - "my firewall rules disappear on reboot, make them persistent"
        pattern: "sudo iptables-save > /etc/iptables/rules.v4"
        example: "sudo iptables-save > /etc/iptables/rules.v4"

    key_flags:
      - flag: "-A"
        meaning: "Append rule to chain"
      - flag: "-I"
        meaning: "Insert rule at position (default: top)"
      - flag: "-D"
        meaning: "Delete rule by spec or line number"
      - flag: "-L"
        meaning: "List rules"
      - flag: "-F"
        meaning: "Flush (delete all) rules in chain"
      - flag: "-P"
        meaning: "Set default chain policy"
      - flag: "-s / -d"
        meaning: "Source / destination IP or CIDR"
      - flag: "-p"
        meaning: "Protocol (tcp, udp, icmp)"
      - flag: "--dport / --sport"
        meaning: "Destination / source port"
      - flag: "-j"
        meaning: "Jump target (ACCEPT, DROP, REJECT, MASQUERADE, LOG)"
      - flag: "-t"
        meaning: "Table (filter, nat, mangle, raw)"

    safety:
      level: dangerous
      requires_sudo: true
      confirmation_required_for:
        - "iptables -F (flush all rules)"
        - "iptables -P INPUT DROP (default deny)"
        - "iptables -P FORWARD DROP"
        - "any rule that could lock you out of SSH"
      blocked_patterns:
        - "iptables -P INPUT DROP"
        - "iptables -F"

    undo:
      "iptables -A {chain} -s {ip} -j DROP": "sudo iptables -D {chain} -s {ip} -j DROP"
      "iptables -A INPUT -p tcp --dport {port} -j ACCEPT": "sudo iptables -D INPUT -p tcp --dport {port} -j ACCEPT"

    distro_notes:
      all: "Legacy tool — nftables (nft) is the modern replacement on most distros. Rules do not persist across reboots without iptables-save / iptables-restore or a service like iptables-persistent."
      debian_ubuntu: "Use 'apt install iptables-persistent' for persistence"

    related_commands:
      - nft
      - ufw
      - firewall-cmd

  - name: nft
    description: "Configure nftables — the modern Linux firewall framework replacing iptables"
    common_intents:
      - intent: "list the complete current ruleset"
        alternate_phrasings:
          - "sudo nft list ruleset"
          - "show me all nftables rules"
          - "what firewall rules are active right now"
          - "dump nft config"
        pattern: "sudo nft list ruleset"
        example: "sudo nft list ruleset"

      - intent: "add a rule to accept traffic on specific ports"
        alternate_phrasings:
          - "sudo nft add rule inet filter input tcp dport {port} accept"
          - "open port {port} in nftables"
          - "allow incoming on port {port}"
        pattern: "sudo nft add rule {inet} {filter} {input} tcp dport \\{ {port} \\} accept"
        example: "sudo nft add rule inet filter input tcp dport { 80, 443 } accept"

      - intent: "save current nftables ruleset to config file"
        alternate_phrasings:
          - "sudo nft list ruleset > /etc/nftables.conf"
          - "persist nftables rules across reboots"
          - "save nft config"
        pattern: "sudo nft list ruleset > /etc/nftables.conf"
        example: "sudo nft list ruleset > /etc/nftables.conf"

      - intent: "load nftables rules from a config file"
        alternate_phrasings:
          - "sudo nft -f {file}"
          - "apply nftables config from {file}"
          - "restore nft ruleset from file"
        pattern: "sudo nft -f {path/to/nftables.conf}"
        example: "sudo nft -f /etc/nftables.conf"

      - intent: "delete a specific rule by handle"
        alternate_phrasings:
          - "sudo nft delete rule {family} {table} {chain} handle {handle}"
          - "remove nft rule with handle {handle}"
          - "undo that nft rule"
        pattern: "sudo nft delete rule {family} {table} {chain} handle {handle}"
        example: "sudo nft delete rule inet filter input handle 3"

      - intent: "add a NAT masquerade rule"
        alternate_phrasings:
          - "sudo nft add rule nat postrouting ip saddr {subnet} masquerade"
          - "set up NAT with nftables for {subnet}"
        pattern: "sudo nft add rule nat postrouting ip saddr {subnet} masquerade"
        example: "sudo nft add rule nat postrouting ip saddr 192.168.0.0/24 masquerade"

    key_flags:
      - flag: "list ruleset"
        meaning: "Display complete current configuration"
      - flag: "add table"
        meaning: "Create a new table"
      - flag: "add chain"
        meaning: "Create a new chain in a table"
      - flag: "add rule"
        meaning: "Append a rule to a chain"
      - flag: "delete rule"
        meaning: "Remove a rule by handle number"
      - flag: "--handle"
        meaning: "Show handle numbers (needed to delete rules)"
      - flag: "-f"
        meaning: "Load config from a file"

    safety:
      level: dangerous
      requires_sudo: true
      confirmation_required_for:
        - "flush ruleset"
        - "policy drop on input chain"
        - "any rule that could block SSH access"
      blocked_patterns:
        - "nft flush ruleset"

    undo:
      "nft add rule {chain} ... accept": "sudo nft delete rule {chain} handle {handle}"

    distro_notes:
      all: "Modern replacement for iptables. Use 'nft --handle --numeric list ruleset' to see handles needed for deletion."
      debian_ubuntu: "Enable at boot: systemctl enable nftables"

    related_commands:
      - iptables
      - ufw
      - firewall-cmd

