        alternate_phrasings:
          - "sudo tcpdump -w {file}"
          - "capture packets to a pcap file"
          - "record network traffic to {file} for Wireshark"
          - "save a packet capture"
        pattern: "sudo tcpdump -i {interface} -w {path/to/capture.pcap}"
        example: "sudo tcpdump -i eth0 -w /tmp/capture.pcap"

      - intent: "read and analyze a saved packet capture file"
        alternate_phrasings:
          - "tcpdump -r {file}"
          - "open a pcap file with tcpdump"
          - "analyze captured traffic in {file}"
        pattern: "tcpdump -r {path/to/capture.pcap}"
        example: "tcpdump -r /tmp/capture.pcap"

      - intent: "capture traffic between two hosts on a specific port"
        alternate_phrasings:
          - "sudo tcpdump src {src} and dst {dst} and port {port}"
          - "capture only traffic from {src} to {dst} on port {port}"
          - "narrow tcpdump to specific source, destination and port"
        pattern: "sudo tcpdump -i {interface} src {src_ip} and dst {dst_ip} and dst port {port}"
        example: "sudo tcpdump -i eth0 src 192.168.1.1 and dst 192.168.1.2 and dst port 80"

      - intent: "list available network interfaces for capture"
        alternate_phrasings:
          - "tcpdump -D"
          - "what interfaces can I capture on"
          - "show tcpdump interface list"
        pattern: "tcpdump -D"
        example: "tcpdump -D"

    key_flags:
      - flag: "-i"
        meaning: "Interface to capture on (-i any for all)"
      - flag: "-w"
        meaning: "Write raw packets to a file"
      - flag: "-r"
        meaning: "Read from a saved capture file"
      - flag: "-n"
        meaning: "No DNS resolution"
      - flag: "-nn"
        meaning: "No DNS resolution and no port name resolution"
      - flag: "-A"
        meaning: "Print packet data in ASCII"
      - flag: "-X"
        meaning: "Print packet data in hex and ASCII"
      - flag: "-c"
        meaning: "Stop after capturing N packets"
      - flag: "-D"
        meaning: "List available interfaces"
      - flag: "-s"
        meaning: "Snapshot length (bytes per packet; 0 = full packet)"

    safety:
      level: dangerous
      requires_sudo: true
      confirmation_required_for:
        - "capturing on production interfaces"
        - "long-running captures that may fill disk"
      blocked_patterns: []

    undo: {}

    distro_notes:
      all: "Captures may contain sensitive data (passwords, tokens). Handle pcap files carefully. Use -c or -w with rotation to avoid unbounded disk usage."

    related_commands:
      - wireshark
      - tshark
      - ss
      - nmap

  - name: ethtool
    description: "Display and configure Network Interface Controller (NIC) settings — speed, duplex, offloads, statistics"
    common_intents:
      - intent: "show current settings for an interface"
        alternate_phrasings:
          - "ethtool {interface}"
          - "check the speed and duplex of {interface}"
          - "is {interface} running at gigabit or 100Mbps"
          - "interface {interface} seems slow, check its settings"
        pattern: "ethtool {interface}"
        example: "ethtool eth0"

      - intent: "show interface statistics and error counters"
        alternate_phrasings:
          - "ethtool -S {interface}"
          - "are there packet errors or drops on {interface}"
          - "show NIC statistics for {interface}"
          - "check for hardware errors on {interface}"
        pattern: "ethtool -S {interface}"
        example: "ethtool -S eth0"

      - intent: "show the driver being used for an interface"
        alternate_phrasings:
          - "ethtool -i {interface}"
          - "what kernel driver is handling {interface}"
          - "driver info for {interface}"
        pattern: "ethtool -i {interface}"
        example: "ethtool -i eth0"

      - intent: "show all hardware offload features for an interface"
        alternate_phrasings:
          - "ethtool -k {interface}"
          - "what offloads are enabled on {interface}"
          - "show checksum offload and TSO settings"
        pattern: "ethtool -k {interface}"
        example: "ethtool -k eth0"

      - intent: "set interface speed and duplex"
        alternate_phrasings:
          - "ethtool -s {interface} speed {speed} duplex {duplex}"
          - "force {interface} to {speed}Mbps {duplex}"
          - "disable autoneg on {interface} and hardcode speed"
        pattern: "sudo ethtool -s {interface} speed {10|100|1000} duplex {half|full} autoneg {on|off}"
        example: "sudo ethtool -s eth0 speed 1000 duplex full autoneg off"

    key_flags:
      - flag: "-i / --driver"
        meaning: "Show driver information"
      - flag: "-k / --show-features"
        meaning: "Show all supported features and offloads"
      - flag: "-S / --statistics"
        meaning: "Show NIC statistics and error counters"
      - flag: "-s / --change"
        meaning: "Modify interface settings (speed, duplex, autoneg)"
      - flag: "-p / --identify"
        meaning: "Blink the NIC's LED to identify it physically"
      - flag: "-P"
        meaning: "Show permanent hardware (burned-in) MAC address"

    safety:
      level: moderate
      requires_sudo: true
      confirmation_required_for:
        - "changing speed or duplex on a live interface"
      blocked_patterns: []

    undo:
      "ethtool -s {iface} speed {s} duplex {d} autoneg off": "sudo ethtool -s {iface} autoneg on"

    distro_notes:
      all: "Changes made with ethtool -s are not persistent across reboots. Use network configuration management (nmcli, /etc/network/interfaces, netplan) for persistent settings."

    related_commands:
      - ip
      - nmcli
      - ifconfig

  - name: nmcli
    description: "Manage NetworkManager connections, devices, and Wi-Fi from the command line"
    common_intents:
      - intent: "show status of all network devices"
        alternate_phrasings:
          - "nmcli device"
          - "nmcli dev status"
          - "what network interfaces does NetworkManager see"
          - "overview of all connections and their state"
          - "my network isn't working, check device status"
        pattern: "nmcli device status"
        example: "nmcli device status"

      - intent: "list all configured network connections"
        alternate_phrasings:
          - "nmcli connection"
          - "show all NetworkManager connections"
          - "what connections are configured"
          - "list saved wifi profiles"
        pattern: "nmcli connection show"
        example: "nmcli connection show"

      - intent: "list available Wi-Fi networks"
        alternate_phrasings:
          - "nmcli device wifi list"
          - "show available wifi networks"
          - "scan for wifi"
          - "what wifi networks are nearby"
          - "I can't find my wifi network"
        pattern: "nmcli device wifi list"
        example: "nmcli device wifi list"

      - intent: "connect to a Wi-Fi network"
        alternate_phrasings:
          - "nmcli device wifi connect {ssid} password {pass}"
          - "join the wifi network {ssid}"
          - "connect to {ssid} wifi"
          - "wifi isn't connected, hook up to {ssid}"
        pattern: "nmcli device wifi connect {ssid} password {password}"
        example: "nmcli device wifi connect MyNetwork password secretpass"

      - intent: "show the current Wi-Fi password"
        alternate_phrasings:
          - "nmcli device wifi show-password"
          - "what is my wifi password"
          - "show the password for the current wifi connection"
          - "someone needs the wifi password"
        pattern: "nmcli device wifi show-password"
        example: "nmcli device wifi show-password"

      - intent: "bring a connection up or down"
        alternate_phrasings:
          - "nmcli connection up {connection}"
          - "activate the {connection} connection"
          - "reconnect to {connection}"
          - "nmcli con down {connection}"
        pattern: "nmcli connection {up|down} {connection_name_or_uuid}"
        example: "nmcli connection up 'Wired connection 1'"

      - intent: "import a VPN configuration file"
        alternate_phrasings:
          - "nmcli connection import type openvpn file {file}"
          - "add a VPN from an OVPN file"
          - "set up OpenVPN from {file}"
        pattern: "nmcli connection import type openvpn file {path/to/vpn.ovpn}"
        example: "nmcli connection import type openvpn file ~/vpn/work.ovpn"

      - intent: "enable or disable Wi-Fi radio"
        alternate_phrasings:
          - "nmcli radio wifi {on|off}"
          - "turn wifi on"
          - "disable wifi"
          - "is wifi enabled or disabled"
        pattern: "nmcli radio wifi {on|off}"
        example: "nmcli radio wifi off"

    key_flags:
      - flag: "device / dev"
        meaning: "Manage network interfaces"
      - flag: "device wifi"
        meaning: "Wi-Fi specific operations"
      - flag: "connection / con"
        meaning: "Manage stored connections"
      - flag: "connection up / down"
        meaning: "Activate or deactivate a connection"
      - flag: "radio wifi on/off"
        meaning: "Enable or disable the Wi-Fi radio"
      - flag: "-f"
        meaning: "Fields to display"
      - flag: "--ask"
        meaning: "Prompt for passwords interactively"
      - flag: "show --active"
        meaning: "Show only currently active connections"

    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for:
        - "taking down active connections"
        - "modifying static IP configuration"
      blocked_patterns: []

    undo:
      "nmcli connection down {con}": "nmcli connection up {con}"
      "nmcli radio wifi off": "nmcli radio wifi on"

    distro_notes:
      all: "Requires NetworkManager to be running (systemctl status NetworkManager). nmtui provides a terminal UI alternative. Not available on systems using systemd-networkd or Netplan directly."
      debian_ubuntu: "Install: apt install network-manager"

    related_commands:
      - nmtui
      - ip
      - iwconfig
      - hostnamectl
