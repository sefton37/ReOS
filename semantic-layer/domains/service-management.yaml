          - "show me systemd timers and when they next run"
          - "list systemd cron-equivalent jobs"
          - "what timers are scheduled"
        pattern: "systemctl list-timers"
        example: "systemctl list-timers"

      - intent: "show all timers including inactive ones"
        alternate_phrasings:
