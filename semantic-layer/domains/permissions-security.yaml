  - name: openssl
    description: "OpenSSL cryptographic toolkit for generating keys, certificates, CSRs, and testing TLS connections"
    common_intents:
      - intent: "generate a private RSA key"
        alternate_phrasings:
          - "openssl genrsa -out key.pem 2048"
          - "create a new private key"
          - "generate an RSA private key"
          - "I need a private key to create a certificate"
        pattern: "openssl genrsa -out {key_file} {bits}"
        example: "openssl genrsa -out server.key 2048"
      - intent: "generate a self-signed certificate"
        alternate_phrasings:
          - "openssl req -new -x509 -key key.pem -out cert.pem -days 365"
          - "create a self-signed SSL certificate"
          - "make a cert for local development"
          - "I need HTTPS locally without a real CA"
          - "self-sign a certificate"
        pattern: "openssl req -new -x509 -key {key_file} -out {cert_file} -days {days}"
        example: "openssl req -new -x509 -key server.key -out server.crt -days 365"
      - intent: "create a Certificate Signing Request (CSR)"
        alternate_phrasings:
          - "openssl req -new -key key.pem -out request.csr"
          - "generate a CSR for a CA to sign"
          - "I need to request a certificate from a certificate authority"
          - "create a CSR file"
        pattern: "openssl req -new -key {key_file} -out {csr_file}"
        example: "openssl req -new -key server.key -out server.csr"
      - intent: "inspect a certificate's details"
        alternate_phrasings:
          - "openssl x509 -in cert.pem -text -noout"
          - "show what's inside a certificate"
          - "check certificate expiration and subject"
          - "read a certificate file"
          - "when does this cert expire"
        pattern: "openssl x509 -in {cert_file} -text -noout"
        example: "openssl x509 -in server.crt -text -noout"
      - intent: "test a TLS connection to a server"
        alternate_phrasings:
          - "openssl s_client -connect host:443"
          - "check if a server's SSL/TLS is working"
          - "debug a TLS handshake"
          - "verify the certificate a server presents"
          - "is this server's HTTPS configured correctly"
        pattern: "openssl s_client -connect {hostname}:443"
        example: "openssl s_client -connect example.com:443"
      - intent: "encrypt a file using symmetric AES encryption"
        alternate_phrasings:
          - "openssl enc -aes-256-cbc -in file -out file.enc"
          - "password-encrypt a file with openssl"
          - "symmetrically encrypt a file"
          - "encrypt a file with a passphrase"
        pattern: "openssl enc -e -aes-256-cbc -salt -pbkdf2 -in {input_file} -out {output_file}"
        example: "openssl enc -e -aes-256-cbc -salt -pbkdf2 -in secrets.txt -out secrets.enc"
    key_flags:
      - flag: "genrsa"
        meaning: "Generate an RSA private key of specified bit length"
      - flag: "req -new -x509"
        meaning: "Generate a self-signed certificate directly"
      - flag: "req -new"
        meaning: "Generate a Certificate Signing Request"
      - flag: "x509 -text -noout"
        meaning: "Display certificate contents in human-readable form without re-outputting the PEM"
      - flag: "s_client -connect"
        meaning: "Open a TLS connection to test server certificate and handshake"
      - flag: "enc -e / -d"
        meaning: "Encrypt (-e) or decrypt (-d) using a symmetric cipher"
      - flag: "-days"
        meaning: "Certificate validity period in days"
    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for:
        - "overwriting existing key files"
      blocked_patterns: []
    undo:
      "encrypted a file": "openssl enc -d -aes-256-cbc -salt -pbkdf2 -in {output_file} -out {original_file}"
      "generated a key": "rm {key_file} (irreversible — store securely before deleting)"
    related_commands:
      - gpg
      - ssh-keygen
      - curl

  - name: gpg
    description: "GNU Privacy Guard — OpenPGP encryption, decryption, signing, and key management"
    common_intents:
      - intent: "generate a new GPG key pair"
        alternate_phrasings:
          - "gpg --gen-key"
          - "create a GPG key"
          - "set up GPG for the first time"
          - "I need a PGP key to sign things"
          - "make a new GPG keypair"
        pattern: "gpg --full-generate-key"
        example: "gpg --full-generate-key"
      - intent: "list all GPG keys in the keyring"
        alternate_phrasings:
          - "gpg --list-keys"
          - "show my GPG keys"
          - "what keys do I have"
          - "list public keys"
        pattern: "gpg --list-keys"
        example: "gpg --list-keys"
      - intent: "encrypt a file for a recipient"
        alternate_phrasings:
          - "gpg --encrypt --recipient user@example.com file"
          - "encrypt a file with someone's public key"
          - "gpg encrypt for alice"
          - "send an encrypted file to someone"
          - "PGP-encrypt this file"
        pattern: "gpg --encrypt --recipient {recipient_email} {file}"
        example: "gpg --encrypt --recipient alice@example.com document.txt"
      - intent: "decrypt a GPG-encrypted file"
        alternate_phrasings:
          - "gpg --decrypt file.gpg"
          - "decrypt a .gpg file"
          - "open an encrypted file"
          - "I received an encrypted file, how do I read it"
        pattern: "gpg --decrypt {encrypted_file}"
        example: "gpg --decrypt document.txt.gpg"
      - intent: "symmetrically encrypt a file with a passphrase"
        alternate_phrasings:
          - "gpg -c file"
          - "encrypt a file without a recipient key, just a password"
          - "password-protect a file with gpg"
          - "symmetric gpg encryption"
        pattern: "gpg --symmetric {file}"
        example: "gpg --symmetric backup.tar"
      - intent: "sign a file to prove authenticity"
        alternate_phrasings:
          - "gpg --clearsign file"
          - "add a GPG signature to a file"
          - "sign a document with my GPG key"
          - "I want to prove this file came from me"
        pattern: "gpg --clearsign {file}"
        example: "gpg --clearsign release-notes.txt"
      - intent: "import a public key"
        alternate_phrasings:
          - "gpg --import key.gpg"
          - "add a public key to my keyring"
          - "import someone's GPG key"
          - "load a key file into gpg"
        pattern: "gpg --import {key_file}"
        example: "gpg --import alice_public.gpg"
      - intent: "export a public key"
        alternate_phrasings:
          - "gpg --export --armor user@example.com"
          - "share my public key"
          - "get my public key in text format"
          - "output my GPG public key"
        pattern: "gpg --export --armor {key_id_or_email}"
        example: "gpg --export --armor alice@example.com"
    key_flags:
      - flag: "--encrypt / -e"
        meaning: "Encrypt using recipient's public key"
      - flag: "--decrypt / -d"
        meaning: "Decrypt a GPG-encrypted file"
      - flag: "--symmetric / -c"
        meaning: "Encrypt with a passphrase (no public key needed)"
      - flag: "--sign / -s"
        meaning: "Sign a file using your private key"
      - flag: "--clearsign"
        meaning: "Create a cleartext signed message"
      - flag: "--armor / -a"
        meaning: "Output in ASCII-armored format (text) instead of binary"
      - flag: "--recipient / -r"
        meaning: "Specify the recipient's key identifier or email"
      - flag: "--list-keys / -k"
        meaning: "List public keys in the keyring"
      - flag: "--import"
        meaning: "Import a key from a file into the local keyring"
      - flag: "--export"
        meaning: "Export a key from the keyring to stdout or file"
    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for:
        - "exporting secret keys (--export-secret-keys)"
        - "deleting keys from keyring"
      blocked_patterns: []
    undo:
      "encrypted a file": "gpg --decrypt {file}.gpg > {original_file}"
      "imported a key": "gpg --delete-key {key_id}"
    related_commands:
      - openssl
      - ssh-keygen
      - age

  - name: chroot
    description: "Run a command or shell with a different root directory, isolating it from the rest of the filesystem"
    common_intents:
      - intent: "enter a chroot environment using a directory as the new root"
        alternate_phrasings:
          - "chroot /path/to/root"
          - "chroot into a directory"
          - "run a shell inside a chroot jail"
          - "I need to repair a system by chrooting into its filesystem"
          - "enter a chroot for system recovery"
        pattern: "sudo chroot {path_to_new_root}"
        example: "sudo chroot /mnt/rescue"
      - intent: "run a specific command inside a chroot environment"
        alternate_phrasings:
          - "chroot /newroot command"
          - "execute a command inside a chroot"
          - "run a single command in an isolated root"
        pattern: "sudo chroot {path_to_new_root} {command}"
        example: "sudo chroot /mnt/rescue /bin/bash"
      - intent: "chroot as a specific user and group"
        alternate_phrasings:
          - "chroot --userspec user:group /newroot"
          - "run chroot as a non-root user"
          - "chroot with a different UID and GID"
        pattern: "sudo chroot --userspec {user}:{group} {path_to_new_root}"
        example: "sudo chroot --userspec appuser:appgroup /opt/sandbox"
    key_flags:
      - flag: "--userspec"
        meaning: "Run the command as the specified user:group inside the chroot"
      - flag: "--groups"
        meaning: "Specify supplementary groups inside the chroot"
    safety:
      level: dangerous
      requires_sudo: true
      confirmation_required_for:
        - "all chroot operations — escaping a chroot is possible with sufficient privileges"
      blocked_patterns: []
    undo:
      "entered chroot": "exit (exits the chroot shell)"
    related_commands:
      - systemd-nspawn
      - unshare
      - docker

  - name: setcap
    description: "Set Linux capabilities on a binary so it can perform privileged operations without running as root"
    common_intents:
      - intent: "grant a binary the capability to bind low-numbered ports without root"
        alternate_phrasings:
          - "setcap cap_net_bind_service+ep /path/to/binary"
          - "let a non-root program bind to port 80 or 443"
          - "allow binding to privileged ports without sudo"
          - "give a service the ability to use ports below 1024"
        pattern: "sudo setcap 'cap_net_bind_service+ep' {binary}"
        example: "sudo setcap 'cap_net_bind_service+ep' /usr/bin/node"
      - intent: "grant raw socket capabilities (for network tools)"
        alternate_phrasings:
          - "setcap cap_net_raw+ep binary"
          - "allow a program to send raw network packets"
          - "give a tool permission to use raw sockets"
        pattern: "sudo setcap 'cap_net_raw+ep' {binary}"
        example: "sudo setcap 'cap_net_raw+ep' /usr/bin/ping"
      - intent: "set multiple capabilities on a binary"
        alternate_phrasings:
          - "setcap 'cap_a,cap_b+ep' binary"
          - "assign several capabilities at once"
          - "grant multiple privilege capabilities to a program"
        pattern: "sudo setcap '{cap1,cap2+ep}' {binary}"
        example: "sudo setcap 'cap_dac_read_search,cap_sys_tty_config+ep' /usr/bin/mytool"
      - intent: "remove all capabilities from a binary"
        alternate_phrasings:
          - "setcap -r binary"
          - "strip all capabilities from a file"
          - "clear capabilities on a binary"
          - "revoke elevated capabilities"
        pattern: "sudo setcap -r {binary}"
        example: "sudo setcap -r /usr/bin/node"
    key_flags:
      - flag: "+ep"
        meaning: "Grant capability in both effective and permitted sets"
      - flag: "+p"
        meaning: "Grant capability in permitted set only"
      - flag: "-r"
        meaning: "Remove all capabilities from the specified file"
      - flag: "-v"
        meaning: "Verify that the specified capabilities are set (returns error if not)"
    safety:
      level: dangerous
      requires_sudo: true
      confirmation_required_for:
        - "any setcap operation — granting capabilities can escalate privilege"
      blocked_patterns: []
    undo:
      "set capabilities": "sudo setcap -r {binary}"
    related_commands:
      - getcap
      - chown
      - chmod

  - name: getcap
    description: "Display the Linux capabilities set on files and binaries"
    common_intents:
      - intent: "show capabilities set on specific files"
        alternate_phrasings:
          - "getcap /path/to/binary"
          - "what capabilities does this binary have"
          - "check if a file has special privileges"
          - "show setcap flags on this program"
        pattern: "getcap {file}"
        example: "getcap /usr/bin/ping"
      - intent: "recursively scan a directory for files with capabilities"
        alternate_phrasings:
          - "getcap -r /usr"
          - "find all binaries with capabilities set"
          - "scan for files with elevated capabilities"
          - "audit capability assignments across the system"
        pattern: "getcap -r {directory}"
        example: "getcap -r /usr/bin/"
    key_flags:
      - flag: "-r"
        meaning: "Recursively scan directory for files with capabilities set"
      - flag: "-v"
        meaning: "Verbose — show all files checked even if no capabilities are set"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "read capabilities": "no-op — getcap is read-only"
    related_commands:
      - setcap
      - ls
      - find

  - name: apparmor_status
    description: "Show the current AppArmor status and list of loaded, enforcing, and complaining profiles (alias: aa-status)"
    common_intents:
      - intent: "show AppArmor status and list all loaded profiles"
        alternate_phrasings:
          - "aa-status"
          - "is AppArmor enabled and what profiles are loaded"
          - "show AppArmor profile enforcement status"
          - "list enforcing and complaining AppArmor profiles"
          - "check if AppArmor is running"
        pattern: "sudo apparmor_status"
        example: "sudo apparmor_status"
      - intent: "show AppArmor status in JSON format"
        alternate_phrasings:
          - "aa-status --json"
          - "get AppArmor status as JSON for scripting"
          - "machine-readable AppArmor status"
        pattern: "sudo aa-status --json"
        example: "sudo aa-status --json"
      - intent: "show the count of enforcing profiles only"
        alternate_phrasings:
          - "aa-status --enforced"
          - "how many AppArmor profiles are in enforce mode"
          - "count enforcing policies"
        pattern: "sudo aa-status --enforced"
        example: "sudo aa-status --enforced"
    key_flags:
      - flag: "--json"
        meaning: "Output status in JSON format"
      - flag: "--pretty-json"
        meaning: "Output status in indented/pretty JSON format"
      - flag: "--enforced"
        meaning: "Print count of profiles currently in enforce mode"
      - flag: "--complaining"
        meaning: "Print count of profiles in complain (permissive) mode"
      - flag: "--profiled"
        meaning: "Print total count of loaded profiles"
    safety:
      level: safe
      requires_sudo: true
      confirmation_required_for: []
      blocked_patterns: []
    undo:
