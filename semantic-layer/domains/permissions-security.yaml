domain: permissions-security
description: "File permissions, ACLs, firewall, SELinux/AppArmor, encryption, and system hardening"
related_domains:
  - file-operations
  - user-management
  - networking

commands:

  - name: chmod
    description: "Change the read/write/execute permissions of files and directories"
    common_intents:
      - intent: "make a file executable"
        alternate_phrasings:
          - "chmod +x file"
          - "I need to run this script but it says permission denied"
          - "add execute permission to a file"
          - "how do I make this runnable"
          - "mark a script so I can execute it"
        pattern: "chmod u+x {file}"
        example: "chmod u+x deploy.sh"
      - intent: "set permissions using octal notation"
        alternate_phrasings:
          - "chmod 755 file"
          - "set permissions to 644"
          - "give owner full access and everyone else read-only"
          - "use numeric mode to set file permissions"
        pattern: "chmod {octal_mode} {file}"
        example: "chmod 644 config.yaml"
      - intent: "remove write permission from group and others"
        alternate_phrasings:
          - "chmod go-w file"
          - "make this file read-only for everyone except the owner"
          - "stop other users from modifying this file"
          - "lock down write access on this file"
        pattern: "chmod go-w {file}"
        example: "chmod go-w /etc/myapp.conf"
      - intent: "give all users read and execute permission"
        alternate_phrasings:
          - "chmod a+rx file"
          - "let everyone read and run this"
          - "world-readable and world-executable"
          - "open up read/execute to all users"
        pattern: "chmod a+rx {file}"
        example: "chmod a+rx /usr/local/bin/mytool"
      - intent: "recursively change permissions on a directory"
        alternate_phrasings:
          - "chmod -R 755 directory"
          - "set permissions on this whole folder tree"
          - "change perms on everything under this directory"
          - "fix permissions recursively"
        pattern: "chmod -R {octal_mode} {directory}"
        example: "chmod -R 755 /var/www/html"
      - intent: "set permissions so only the owner can read/write (private file)"
        alternate_phrasings:
          - "chmod 600 file"
          - "make this file private — only I should be able to read it"
          - "nobody else should see this file"
          - "lock file to owner only"
        pattern: "chmod 600 {file}"
        example: "chmod 600 ~/.ssh/id_rsa"
    key_flags:
      - flag: "u+x"
        meaning: "Add execute permission for the owning user"
      - flag: "a+r"
        meaning: "Add read permission for all (user, group, others)"
      - flag: "go-w"
        meaning: "Remove write permission from group and others"
      - flag: "-R"
        meaning: "Apply change recursively to all files and subdirectories"
      - flag: "=rwx"
        meaning: "Set exact permissions, clearing any bits not listed"
    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for:
        - "recursive chmod on system directories"
        - "removing execute from binaries"
      blocked_patterns:
        - "chmod 777 -R /"
        - "chmod -R 777 /"
        - "chmod 777 /etc"
        - "chmod 777 /usr"
    undo:
      "changed permissions": "chmod {original_mode} {file} (check with ls -l first)"
    related_commands:
      - chown
      - setfacl
      - umask
      - stat

  - name: chown
    description: "Change the user and group ownership of files and directories"
    common_intents:
      - intent: "change the owner of a file"
        alternate_phrasings:
          - "chown user file"
          - "give this file to a different user"
          - "transfer ownership of a file"
          - "this file needs to belong to someone else"
        pattern: "sudo chown {user} {file}"
        example: "sudo chown alice /var/data/report.csv"
      - intent: "change both owner and group of a file"
        alternate_phrasings:
          - "chown user:group file"
          - "set user and group at the same time"
          - "assign file to a specific user and group"
          - "change ownership and group together"
        pattern: "sudo chown {user}:{group} {file}"
        example: "sudo chown www-data:www-data /var/www/index.html"
      - intent: "recursively change ownership of a directory"
        alternate_phrasings:
          - "chown -R user:group dir"
          - "make this whole directory tree owned by a user"
          - "fix ownership on everything under this folder"
          - "this web root should be owned by the webserver user"
        pattern: "sudo chown -R {user}:{group} {directory}"
        example: "sudo chown -R deploy:deploy /opt/myapp"
      - intent: "change the group of a file without changing the owner"
        alternate_phrasings:
          - "chown :group file"
          - "just change the group, leave the owner alone"
          - "reassign group ownership only"
        pattern: "sudo chown :{group} {file}"
        example: "sudo chown :developers /srv/code/app.py"
      - intent: "change ownership to match a reference file"
        alternate_phrasings:
          - "chown --reference reffile targetfile"
          - "copy ownership from one file to another"
          - "make this file have the same owner as that one"
        pattern: "sudo chown --reference {reference_file} {target_file}"
        example: "sudo chown --reference /etc/nginx/nginx.conf /etc/nginx/site.conf"
    key_flags:
      - flag: "-R"
        meaning: "Recursively change ownership of all files in a directory tree"
      - flag: "-h"
        meaning: "Change ownership of symlink itself, not the file it points to"
      - flag: "--reference"
        meaning: "Copy ownership from a reference file instead of specifying user:group"
    safety:
      level: moderate
      requires_sudo: true
      confirmation_required_for:
        - "recursive chown on system directories"
        - "chown on /etc, /usr, /var"
      blocked_patterns: []
    undo:
      "changed ownership": "sudo chown {original_user}:{original_group} {file} (check with stat {file} first)"
    related_commands:
      - chmod
      - chgrp
      - stat

  - name: umask
    description: "View or set the default permission mask applied to newly created files and directories"
    common_intents:
      - intent: "show the current umask value"
        alternate_phrasings:
          - "umask"
          - "what is my current umask"
          - "what permissions do new files get by default"
          - "check the default file creation mask"
        pattern: "umask"
        example: "umask"
      - intent: "show current umask in symbolic human-readable form"
        alternate_phrasings:
          - "umask -S"
          - "show the umask in letters not numbers"
          - "display umask symbolically"
        pattern: "umask -S"
        example: "umask -S"
      - intent: "set umask so new files are private to the owner"
        alternate_phrasings:
          - "umask 077"
          - "make new files only readable by me"
          - "set strict default permissions — no access for group or others"
          - "private umask for sensitive work"
        pattern: "umask {octal_mask}"
        example: "umask 077"
      - intent: "set umask to standard 022 (owner write, others read)"
        alternate_phrasings:
          - "umask 022"
          - "reset umask to default"
          - "set normal umask"
          - "new files should be world-readable but only owner-writable"
        pattern: "umask 022"
        example: "umask 022"
    key_flags:
      - flag: "-S"
        meaning: "Display umask in symbolic (human-readable) notation instead of octal"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "changed umask": "umask {previous_value} (current shell only — does not persist)"
    related_commands:
      - chmod
      - chown

  - name: setfacl
    description: "Set extended Access Control Lists (ACLs) on files and directories beyond standard owner/group/other"
    common_intents:
      - intent: "grant a specific user read and write access to a file"
        alternate_phrasings:
          - "setfacl -m u:user:rw file"
          - "give a specific user access to this file without changing ownership"
          - "add ACL entry for a user"
          - "I need one more person to have write access but not change the group"
        pattern: "setfacl -m u:{username}:rw {file}"
        example: "setfacl -m u:alice:rw /srv/shared/data.csv"
      - intent: "grant a specific group access to a file"
        alternate_phrasings:
          - "setfacl -m g:group:r file"
          - "let a group read this file via ACL"
          - "add group ACL entry"
          - "give a team read access without chgrp"
        pattern: "setfacl -m g:{group}:{permissions} {file}"
        example: "setfacl -m g:analysts:r /var/reports/q1.csv"
      - intent: "set a default ACL on a directory so new files inherit permissions"
        alternate_phrasings:
          - "setfacl -d -m u:user:rw dir"
          - "new files in this directory should automatically have these ACL entries"
          - "inherit ACL for files created under a directory"
          - "default ACL so I don't have to set it every time"
        pattern: "setfacl -d -m u:{username}:{permissions} {directory}"
        example: "setfacl -d -m u:bob:rw /srv/project/"
      - intent: "remove a user's ACL entry from a file"
        alternate_phrasings:
          - "setfacl -x u:user file"
          - "revoke a user's ACL access"
          - "delete ACL entry for a specific user"
          - "take away that user's extra access"
        pattern: "setfacl -x u:{username} {file}"
        example: "setfacl -x u:alice /srv/shared/data.csv"
      - intent: "remove all ACL entries from a file"
        alternate_phrasings:
          - "setfacl -b file"
          - "clear all ACLs on this file"
          - "strip all extended access control entries"
          - "reset file to just standard unix permissions"
        pattern: "setfacl -b {file}"
        example: "setfacl -b /srv/shared/data.csv"
    key_flags:
      - flag: "-m"
        meaning: "Modify (add or update) an ACL entry"
      - flag: "-x"
        meaning: "Remove a specific ACL entry"
      - flag: "-b"
        meaning: "Remove all extended ACL entries"
      - flag: "-d"
        meaning: "Apply change to default ACL (inherited by new files in directory)"
      - flag: "-R"
        meaning: "Apply ACL change recursively"
    safety:
      level: moderate
      requires_sudo: false
      confirmation_required_for:
        - "default ACL changes on shared system directories"
        - "recursive ACL removal"
      blocked_patterns: []
    undo:
      "added ACL entry": "setfacl -x u:{username} {file}"
      "removed all ACLs": "setfacl -m u:{username}:{permissions} {file} (must re-add manually)"
    related_commands:
      - getfacl
      - chmod
      - chown

  - name: getfacl
    description: "Display the Access Control List (ACL) entries for files and directories"
    common_intents:
      - intent: "show the ACL for a file or directory"
        alternate_phrasings:
          - "getfacl file"
          - "what are the ACL entries on this file"
          - "show me the extended permissions"
          - "who has access to this file beyond owner/group"
        pattern: "getfacl {file}"
        example: "getfacl /srv/shared/data.csv"
      - intent: "show ACL with numeric user and group IDs"
        alternate_phrasings:
          - "getfacl -n file"
          - "show ACL using UIDs and GIDs not names"
          - "numeric ACL output"
        pattern: "getfacl -n {file}"
        example: "getfacl -n /etc/sudoers"
      - intent: "display ACL in tabular format"
        alternate_phrasings:
          - "getfacl -t file"
          - "show ACL as a table"
          - "tabular view of file access list"
        pattern: "getfacl -t {file}"
        example: "getfacl -t /srv/project/"
    key_flags:
      - flag: "-n"
        meaning: "Show numeric user/group IDs instead of names"
      - flag: "-t"
        meaning: "Display output in tabular format"
      - flag: "-R"
        meaning: "Recurse into subdirectories"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "read ACL": "no-op — getfacl is read-only"
    related_commands:
      - setfacl
      - ls
      - stat

  - name: chattr
    description: "Change extended file system attributes such as immutability and append-only on Linux filesystems"
    common_intents:
      - intent: "make a file immutable so it cannot be modified or deleted"
        alternate_phrasings:
          - "chattr +i file"
          - "lock this file so even root can't change it"
          - "protect a file from modification or deletion"
          - "set the immutable flag"
          - "I need this config to be tamper-proof"
        pattern: "sudo chattr +i {file}"
        example: "sudo chattr +i /etc/resolv.conf"
      - intent: "remove the immutable flag from a file"
        alternate_phrasings:
          - "chattr -i file"
          - "unlock an immutable file"
          - "I need to edit a file that was locked with chattr"
          - "clear the immutable attribute"
        pattern: "sudo chattr -i {file}"
        example: "sudo chattr -i /etc/resolv.conf"
      - intent: "set a file to append-only mode"
        alternate_phrasings:
          - "chattr +a file"
          - "make a log file append-only"
          - "allow only appending, not overwriting"
          - "protect a log from being truncated or overwritten"
        pattern: "sudo chattr +a {file}"
        example: "sudo chattr +a /var/log/secure.log"
      - intent: "recursively make a directory immutable"
        alternate_phrasings:
          - "chattr -R +i directory"
          - "lock down this whole directory tree"
          - "make everything under this folder immutable"
          - "protect a config directory recursively"
        pattern: "sudo chattr -R +i {directory}"
        example: "sudo chattr -R +i /etc/myapp/"
    key_flags:
      - flag: "+i"
        meaning: "Set immutable — file cannot be modified, deleted, renamed, or hard-linked"
      - flag: "-i"
        meaning: "Clear immutable flag"
      - flag: "+a"
        meaning: "Set append-only — file can only be opened for appending (useful for logs)"
      - flag: "-a"
        meaning: "Clear append-only flag"
      - flag: "-R"
        meaning: "Recurse into subdirectories"
    safety:
      level: moderate
      requires_sudo: true
      confirmation_required_for:
        - "recursive immutable on system directories"
        - "append-only on files that need rotation"
      blocked_patterns: []
    undo:
      "set immutable (+i)": "sudo chattr -i {file}"
      "set append-only (+a)": "sudo chattr -a {file}"
    related_commands:
      - lsattr
      - chmod

  - name: lsattr
    description: "List extended file system attributes (immutable, append-only, etc.) set by chattr"
    common_intents:
      - intent: "show file attributes in current directory"
        alternate_phrasings:
          - "lsattr"
          - "what chattr flags are set on files here"
          - "check if any files are immutable"
          - "show extended attributes for files"
        pattern: "lsattr"
        example: "lsattr"
      - intent: "show file attributes for a specific path"
        alternate_phrasings:
          - "lsattr /path"
          - "check the attributes on this file"
          - "is this file immutable"
          - "what flags does this file have"
        pattern: "lsattr {path}"
        example: "lsattr /etc/resolv.conf"
      - intent: "recursively show file attributes"
        alternate_phrasings:
          - "lsattr -R"
          - "show attributes for everything under this directory"
          - "recursive lsattr"
        pattern: "lsattr -R {path}"
        example: "lsattr -R /etc/myapp/"
      - intent: "show attributes including hidden files"
        alternate_phrasings:
          - "lsattr -a"
          - "include dotfiles in attribute listing"
          - "show hidden file attributes too"
        pattern: "lsattr -a {path}"
        example: "lsattr -a ~"
    key_flags:
      - flag: "-R"
        meaning: "Recurse into subdirectories"
      - flag: "-a"
        meaning: "Include hidden files (dot files) in the listing"
      - flag: "-d"
        meaning: "List attributes of directories themselves, not their contents"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "listed attributes": "no-op — lsattr is read-only"
    related_commands:
      - chattr
      - ls
      - stat

  - name: ufw
    description: "Uncomplicated Firewall — user-friendly frontend to iptables for managing firewall rules on Ubuntu/Debian"
    common_intents:
      - intent: "enable the firewall"
        alternate_phrasings:
          - "ufw enable"
          - "turn on the firewall"
          - "activate ufw"
          - "start blocking traffic"
          - "my server has no firewall, fix that"
        pattern: "sudo ufw enable"
        example: "sudo ufw enable"
      - intent: "show current firewall rules and status"
        alternate_phrasings:
          - "ufw status"
          - "what ports are open"
          - "show firewall rules"
          - "is the firewall running and what rules are active"
          - "list all ufw rules"
        pattern: "sudo ufw status numbered"
        example: "sudo ufw status numbered"
      - intent: "allow incoming traffic on a port"
        alternate_phrasings:
          - "ufw allow 80"
          - "open port 80 in the firewall"
          - "allow traffic on port 443"
          - "I need to open a port for my web server"
          - "unblock a port"
        pattern: "sudo ufw allow {port}"
        example: "sudo ufw allow 443"
      - intent: "allow a port with a descriptive comment"
        alternate_phrasings:
          - "ufw allow 5432 comment postgres"
          - "open a port and tag it with a label"
          - "allow port and add a note for what it is"
        pattern: "sudo ufw allow {port} comment \"{service_name}\""
        example: "sudo ufw allow 5432 comment \"PostgreSQL\""
      - intent: "allow traffic from a specific IP on a port"
        alternate_phrasings:
          - "ufw allow from ip to port"
          - "whitelist an IP address for a port"
          - "only allow this specific machine to connect on this port"
          - "restrict port 22 to a single IP"
        pattern: "sudo ufw allow proto tcp from {ip_address} to any port {port}"
        example: "sudo ufw allow proto tcp from 192.168.1.50 to any port 22"
      - intent: "deny incoming traffic on a port"
        alternate_phrasings:
          - "ufw deny 80"
          - "block port 80"
          - "close a port in the firewall"
          - "stop traffic on this port"
        pattern: "sudo ufw deny {port}"
        example: "sudo ufw deny 8080"
      - intent: "delete a firewall rule by number"
        alternate_phrasings:
          - "ufw delete rule_number"
          - "remove a ufw rule"
          - "I made a rule that's wrong, delete it"
          - "undo a firewall rule"
        pattern: "sudo ufw delete {rule_number}"
        example: "sudo ufw delete 3"
    key_flags:
      - flag: "enable"
        meaning: "Activate the firewall (starts on boot)"
      - flag: "disable"
        meaning: "Deactivate the firewall — DANGEROUS: leaves system unprotected"
      - flag: "status numbered"
        meaning: "Show all rules with their index numbers for deletion"
      - flag: "allow"
        meaning: "Create a rule to allow traffic"
      - flag: "deny"
        meaning: "Create a rule to block traffic"
      - flag: "delete"
        meaning: "Remove a rule by its number from 'status numbered'"
      - flag: "reset"
        meaning: "Delete all rules and disable ufw — resets to default state"
    safety:
      level: dangerous
      requires_sudo: true
      confirmation_required_for:
        - "ufw enable (will block connections if rules are wrong)"
        - "ufw deny on port 22 (could lock out SSH)"
        - "ufw delete"
      blocked_patterns:
        - "ufw disable"
        - "ufw reset"
    undo:
      "allowed a port": "sudo ufw delete {rule_number}"
      "denied a port": "sudo ufw delete {rule_number}"
      "disabled firewall": "sudo ufw enable"
    related_commands:
      - firewall-cmd
      - iptables
      - ss
      - netstat

  - name: firewall-cmd
    description: "Manage firewalld — the dynamic firewall daemon used on RHEL, Fedora, CentOS, and Rocky Linux"
    common_intents:
      - intent: "list all active firewall zones and rules"
        alternate_phrasings:
          - "firewall-cmd --list-all-zones"
          - "show all firewall rules and zones"
          - "what firewall rules are configured"
          - "show me what the firewall is doing"
        pattern: "firewall-cmd --list-all-zones"
        example: "firewall-cmd --list-all-zones"
      - intent: "show rules for the active zone"
        alternate_phrasings:
          - "firewall-cmd --list-all"
          - "what rules are in the default zone"
          - "show current firewall config"
        pattern: "firewall-cmd --list-all"
        example: "firewall-cmd --list-all"
      - intent: "permanently open a port for a service"
        alternate_phrasings:
          - "firewall-cmd --permanent --add-service https"
          - "allow HTTPS through the firewall permanently"
          - "open port 443 for HTTPS"
          - "add a service rule to firewalld"
          - "I need to allow web traffic through the firewall on this RHEL box"
        pattern: "firewall-cmd --permanent --zone {zone} --add-service {service}"
        example: "firewall-cmd --permanent --zone public --add-service https"
      - intent: "permanently close a port or service"
        alternate_phrasings:
          - "firewall-cmd --permanent --remove-service http"
          - "block a service in firewalld"
          - "close a port permanently"
          - "remove a firewall allow rule"
        pattern: "firewall-cmd --permanent --zone {zone} --remove-service {service}"
        example: "firewall-cmd --permanent --zone public --remove-service http"
      - intent: "reload firewalld to apply permanent changes"
        alternate_phrasings:
          - "firewall-cmd --reload"
          - "apply my permanent firewall changes"
          - "make the permanent rules take effect"
          - "I added a permanent rule but it's not active yet"
        pattern: "firewall-cmd --reload"
        example: "firewall-cmd --reload"
      - intent: "save runtime rules to permanent configuration"
        alternate_phrasings:
          - "firewall-cmd --runtime-to-permanent"
          - "make the current runtime firewall rules permanent"
          - "persist current firewall state"
          - "save firewall changes so they survive reboot"
        pattern: "firewall-cmd --runtime-to-permanent"
        example: "firewall-cmd --runtime-to-permanent"
      - intent: "open a specific port number (not a named service)"
        alternate_phrasings:
          - "firewall-cmd --add-port 8080/tcp"
          - "open a custom port in firewalld"
          - "allow traffic on a non-standard port"
          - "add a port number rule instead of a service name"
        pattern: "firewall-cmd --permanent --zone {zone} --add-port {port}/{protocol}"
        example: "firewall-cmd --permanent --zone public --add-port 8080/tcp"
    key_flags:
      - flag: "--permanent"
        meaning: "Apply change to the permanent (on-disk) configuration — requires --reload to activate"
      - flag: "--zone"
        meaning: "Target a specific firewall zone (public, internal, trusted, etc.)"
      - flag: "--add-service"
        meaning: "Allow a named service (uses predefined port mappings)"
      - flag: "--remove-service"
        meaning: "Block a named service"
      - flag: "--add-port"
        meaning: "Open a specific port/protocol combination"
      - flag: "--reload"
        meaning: "Reload permanent config, discarding any runtime-only changes"
      - flag: "--runtime-to-permanent"
        meaning: "Promote all runtime rules to permanent storage"
      - flag: "--list-all"
        meaning: "Show all rules for the active/default zone"
    safety:
      level: dangerous
      requires_sudo: true
      confirmation_required_for:
        - "removing service rules that may include SSH (port 22)"
        - "--zone block changes"
        - "--runtime-to-permanent (makes all runtime changes permanent)"
      blocked_patterns:
        - "firewall-cmd --panic-on"
        - "firewall-cmd --permanent --zone block --change-interface"
    undo:
      "added service": "firewall-cmd --permanent --zone {zone} --remove-service {service} && firewall-cmd --reload"
      "removed service": "firewall-cmd --permanent --zone {zone} --add-service {service} && firewall-cmd --reload"
      "added port": "firewall-cmd --permanent --zone {zone} --remove-port {port}/{protocol} && firewall-cmd --reload"
    related_commands:
      - ufw
      - iptables
      - ss

  - name: fail2ban-client
    description: "Control the fail2ban intrusion prevention daemon — manage bans, jails, and service status"
    common_intents:
      - intent: "check the status of a fail2ban jail"
        alternate_phrasings:
          - "fail2ban-client status sshd"
          - "how many IPs are banned in the ssh jail"
          - "show fail2ban stats for a service"
          - "is fail2ban working and blocking anything"
          - "show banned IPs for sshd"
        pattern: "fail2ban-client status {jail}"
        example: "fail2ban-client status sshd"
      - intent: "unban an IP address from a jail"
        alternate_phrasings:
          - "fail2ban-client set sshd unbanip 1.2.3.4"
          - "remove an IP from the ban list"
          - "I accidentally locked myself out, unban my IP"
          - "whitelist an IP that got banned by fail2ban"
          - "release a banned IP"
        pattern: "fail2ban-client set {jail} unbanip {ip_address}"
        example: "fail2ban-client set sshd unbanip 203.0.113.42"
      - intent: "check if the fail2ban service is running"
        alternate_phrasings:
          - "fail2ban-client ping"
          - "is fail2ban alive"
          - "verify fail2ban is running"
          - "check fail2ban health"
        pattern: "fail2ban-client ping"
        example: "fail2ban-client ping"
      - intent: "show overall fail2ban status and list of active jails"
        alternate_phrasings:
          - "fail2ban-client status"
          - "list all active fail2ban jails"
          - "what jails does fail2ban have configured"
          - "show all fail2ban jail names"
        pattern: "fail2ban-client status"
        example: "fail2ban-client status"
    key_flags:
      - flag: "status {jail}"
        meaning: "Show stats for a named jail: currently banned IPs, total bans, etc."
      - flag: "set {jail} unbanip {ip}"
        meaning: "Remove a specific IP from a jail's ban list immediately"
      - flag: "ping"
