    related_commands:
      - aa-enforce
      - aa-complain
      - aa-disable

  - name: aa-enforce
    description: "Set an AppArmor profile to enforcing mode, actively blocking policy violations"
    common_intents:
      - intent: "put an AppArmor profile into enforce mode"
        alternate_phrasings:
          - "aa-enforce /etc/apparmor.d/usr.bin.firefox"
          - "activate a specific AppArmor profile"
          - "start enforcing AppArmor restrictions for a program"
          - "switch an AppArmor profile from complain to enforce"
          - "enforce AppArmor policy for a program"
        pattern: "sudo aa-enforce {profile_path}"
        example: "sudo aa-enforce /etc/apparmor.d/usr.sbin.nginx"
      - intent: "enforce multiple profiles at once"
        alternate_phrasings:
          - "aa-enforce profile1 profile2"
          - "activate enforcement on several AppArmor profiles"
          - "enforce a batch of profiles"
        pattern: "sudo aa-enforce {profile1} {profile2}"
        example: "sudo aa-enforce /etc/apparmor.d/usr.sbin.nginx /etc/apparmor.d/usr.sbin.mysqld"
    key_flags:
      - flag: "-d / --dir"
        meaning: "Specify an alternate AppArmor policy directory"
    safety:
      level: moderate
      requires_sudo: true
      confirmation_required_for:
        - "enforcing a new profile — may break a service if profile is incomplete"
      blocked_patterns: []
    undo:
      "enforced a profile": "sudo aa-complain {profile_path} (sets profile back to complain/audit mode)"
    related_commands:
      - apparmor_status
      - aa-complain
      - aa-disable

  - name: getenforce
    description: "Print the current SELinux enforcement mode: Enforcing, Permissive, or Disabled"
    common_intents:
      - intent: "check the current SELinux mode"
        alternate_phrasings:
          - "getenforce"
          - "is SELinux in enforcing or permissive mode"
          - "what mode is SELinux in"
          - "is SELinux blocking things right now"
          - "check SELinux enforcement status"
        pattern: "getenforce"
        example: "getenforce"
    key_flags: []
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "read mode": "no-op — getenforce is read-only"
    related_commands:
      - sestatus
      - setenforce
      - sestatus

  - name: setenforce
    description: "Toggle SELinux between enforcing and permissive modes at runtime (does not persist across reboots)"
    common_intents:
      - intent: "put SELinux into permissive mode (logs but does not block)"
        alternate_phrasings:
          - "setenforce 0"
          - "disable SELinux enforcement temporarily"
          - "set SELinux to permissive to debug an access denied error"
          - "stop SELinux from blocking things without fully disabling it"
          - "I'm troubleshooting an SELinux denial, put it in permissive"
        pattern: "sudo setenforce 0"
        example: "sudo setenforce 0"
      - intent: "put SELinux back into enforcing mode"
        alternate_phrasings:
          - "setenforce 1"
          - "re-enable SELinux enforcement"
          - "turn SELinux back on after debugging"
          - "restore SELinux to enforcing after testing in permissive"
        pattern: "sudo setenforce 1"
        example: "sudo setenforce 1"
    key_flags:
      - flag: "0 / Permissive"
        meaning: "Switch to permissive mode — SELinux logs denials but does not enforce"
      - flag: "1 / Enforcing"
        meaning: "Switch to enforcing mode — SELinux actively blocks policy violations"
    safety:
      level: dangerous
      requires_sudo: true
      confirmation_required_for:
        - "setenforce 0 — disables SELinux protection, should only be used temporarily for debugging"
      blocked_patterns:
        - "setenforce 0"
    undo:
      "set permissive (0)": "sudo setenforce 1"
      "set enforcing (1)": "sudo setenforce 0"
    related_commands:
      - getenforce
      - sestatus

  - name: sestatus
    description: "Print detailed SELinux status including mode, policy name, MLS/MCS status, and loaded boolean values"
    common_intents:
      - intent: "show full SELinux status and configuration"
        alternate_phrasings:
          - "sestatus"
          - "what is the SELinux policy and current mode"
          - "show detailed SELinux configuration"
          - "is SELinux enabled and what policy is it using"
          - "full SELinux status report"
        pattern: "sestatus"
        example: "sestatus"
      - intent: "show the state of all SELinux policy booleans"
        alternate_phrasings:
          - "sestatus -b"
          - "list all SELinux booleans and their on/off state"
          - "show SELinux boolean flags"
          - "what SELinux booleans are enabled"
        pattern: "sestatus -b"
        example: "sestatus -b"
      - intent: "show current file and process security contexts"
        alternate_phrasings:
          - "sestatus -v"
          - "display SELinux contexts for files and processes"
          - "what labels do key files and processes have in SELinux"
          - "show SELinux security contexts verbosely"
        pattern: "sestatus -v"
        example: "sestatus -v"
    key_flags:
      - flag: "-b"
        meaning: "List all policy booleans and their current on/off state"
      - flag: "-v"
        meaning: "Verbose — show security contexts for files and processes"
    safety:
      level: safe
      requires_sudo: false
      confirmation_required_for: []
      blocked_patterns: []
    undo:
      "read status": "no-op — sestatus is read-only"
    related_commands:
      - getenforce
      - setenforce
      - getsebool
      - setsebool
